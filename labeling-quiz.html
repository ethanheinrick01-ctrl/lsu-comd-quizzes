<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMD 4190 — Audiology Labeling Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
#header{background:#16213e;padding:12px 20px;border-bottom:2px solid #4a9eff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
#header h1{font-size:1rem;color:#4a9eff;font-weight:800;letter-spacing:.03em}
#progress-dots{display:flex;gap:5px;align-items:center}
.dot{width:11px;height:11px;border-radius:50%;background:#222;border:2px solid #444;transition:all .3s;cursor:pointer}
.dot.active{border-color:#4a9eff;background:#4a9eff}
.dot.done-pass{border-color:#2ecc71;background:#2ecc71}
.dot.done-fail{border-color:#e74c3c;background:#e74c3c}
#scorebox{font-size:.85rem;color:#aaa}
#scorebox span{color:#4a9eff;font-weight:700}

#main{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;gap:14px;overflow:auto}
#quiz-header{text-align:center}
#quiz-title{font-size:1.2rem;font-weight:700;color:#4a9eff}
#quiz-desc{font-size:.8rem;color:#888;margin-top:3px}
#instructions{font-size:.78rem;color:#f39c12;background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.3);padding:6px 12px;border-radius:6px;text-align:center}

/* Image + marker overlay */
#diagram-wrap{
  background:#fff;border-radius:10px;padding:6px;
  box-shadow:0 0 25px rgba(74,158,255,.25);
  max-width:700px;width:100%;
  position:relative;
}
#diagram-wrap img{width:100%;height:auto;display:block;border-radius:6px}

.mspot{
  position:absolute;
  width:30px;height:30px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#fff;
  border:2.5px solid rgba(255,255,255,0.9);
  box-shadow:0 2px 6px rgba(0,0,0,.6);
  transition:all .2s;
  user-select:none;
}
.mspot:hover{transform:translate(-50%,-50%) scale(1.15)}
.mspot.empty{background:#e67e22}
.mspot.filled{background:#2980b9}
.mspot.correct{background:#27ae60}
.mspot.wrong{background:#e74c3c}

.mtag{
  position:absolute;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.92);
  color:#003080;
  font-size:9px;font-weight:700;
  padding:2px 5px;border-radius:3px;
  pointer-events:none;
  white-space:nowrap;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
  max-width:100px;
  overflow:hidden;text-overflow:ellipsis;
}
.mtag.correct-tag{color:#1a6a30}
.mtag.wrong-tag{color:#8b0000}

#wordbank{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:700px;width:100%}
#wordbank-label{width:100%;text-align:center;font-size:.72rem;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.wcard{padding:7px 13px;border-radius:18px;background:#0f3460;border:2px solid #4a9eff;color:#ddd;cursor:pointer;font-size:.8rem;transition:all .2s;user-select:none;white-space:nowrap}
.wcard:hover:not(.used):not(.sel){background:#1a5276;transform:translateY(-1px)}
.wcard.sel{background:#e67e22;border-color:#e67e22;color:#fff;box-shadow:0 0 10px rgba(230,126,34,.5)}
.wcard.used{opacity:.28;pointer-events:none}

#feedback{padding:10px 18px;border-radius:8px;font-weight:600;text-align:center;display:none;font-size:.9rem}
#feedback.show{display:block}
#feedback.pass{background:rgba(46,204,113,.15);border:2px solid #2ecc71;color:#2ecc71}
#feedback.fail{background:rgba(231,76,60,.15);border:2px solid #e74c3c;color:#e74c3c}

#controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button{padding:9px 20px;border-radius:7px;border:none;cursor:pointer;font-size:.85rem;font-weight:700;transition:all .2s}
button:disabled{opacity:.35;cursor:default}
#btnPrev{background:#34495e;color:#fff}
#btnPrev:not(:disabled):hover{background:#2c3e50}
#btnCheck{background:#27ae60;color:#fff}
#btnCheck:not(:disabled):hover{background:#219a52}
#btnReset{background:#7f8c8d;color:#fff}
#btnReset:hover{background:#636e72}
#btnNext{background:#4a9eff;color:#fff}
#btnNext:not(:disabled):hover{background:#2980b9}

#final{display:none;flex-direction:column;align-items:center;gap:20px;padding:40px 20px;text-align:center}
#final.show{display:flex}
#final h2{font-size:2rem;color:#4a9eff}
#final-score{font-size:3.5rem;font-weight:900;color:#f1c40f}
#final-msg{font-size:1rem;color:#aaa;max-width:440px;line-height:1.55}
#btnRestart{background:#4a9eff;color:#fff;font-size:1rem;padding:12px 28px}
</style>
</head>
<body>

<div id="header">
  <h1>🦴 COMD 4190 — Audiology Labeling Quiz</h1>
  <div id="progress-dots"></div>
  <div id="scorebox">Score: <span id="scoreNum">0</span> / <span id="scoreTotal">0</span></div>
</div>

<div id="main">
  <div id="quiz-header">
    <div id="quiz-title"></div>
    <div id="quiz-desc"></div>
  </div>
  <div id="instructions">① Click a term from the word bank &rarr; ② Click a numbered marker to place it. Click a placed marker to unplace it.</div>
  <div id="diagram-wrap"></div>
  <div id="wordbank"><div id="wordbank-label">— Word Bank —</div></div>
  <div id="feedback"></div>
  <div id="controls">
    <button id="btnPrev" onclick="go(cur-1)">&#8592; Prev</button>
    <button id="btnCheck" onclick="checkAnswers()">Check Answers</button>
    <button id="btnReset" onclick="resetDiagram()">Reset</button>
    <button id="btnNext" onclick="go(cur+1)">Next &#8594;</button>
  </div>
</div>

<div id="final">
  <h2>Quiz Complete!</h2>
  <div id="final-score"></div>
  <div id="final-msg"></div>
  <button id="btnRestart" onclick="restart()">Try Again</button>
</div>

<script>
const Q = [
{

  imgW:900, imgH:683,
  src:"vestibular-labyrinth-blanked.jpg",

},

},

},
{
  title:"Diagram 5: Organ of Corti",
  desc:"Cross-section through the cochlear duct showing hair cells and supporting structures",
  imgW:900, imgH:576,
  src:"vestibular-labyrinth-blanked.jpg",
  labels:[{"id": 1, "ans": "Tectorial Membrane", "lp": 40, "tp": 28}, {"id": 2, "ans": "Outer Hair Cell", "lp": 52, "tp": 38}, {"id": 3, "ans": "Inner Tunnel", "lp": 61, "tp": 48}, {"id": 4, "ans": "Inner Hair Cell", "lp": 74, "tp": 30}, {"id": 5, "ans": "Scala Media", "lp": 42, "tp": 20}, {"id": 6, "ans": "Outer Pillar Cell", "lp": 55, "tp": 56}, {"id": 7, "ans": "Inner Pillar Cell", "lp": 65, "tp": 53}, {"id": 8, "ans": "Basilar Membrane", "lp": 58, "tp": 72}]
},

  title:"Diagram 6: Central Auditory Pathway",
  desc:"Ascending bilateral pathway: cochlea \u2192 cochlear nucleus \u2192 superior olive \u2192 inferior colliculus \u2192 MGB \u2192 auditory cortex",
  imgW:900, imgH:1002,
  src:"vestibular-labyrinth-blanked.jpg",
  labels:[{"id": 1, "ans": "Cochlea", "lp": 15, "tp": 89}, {"id": 2, "ans": "Cochlear Nucleus", "lp": 17, "tp": 72}, {"id": 3, "ans": "Superior Olive", "lp": 35, "tp": 72}, {"id": 4, "ans": "Inferior Colliculus", "lp": 35, "tp": 51}, {"id": 5, "ans": "Medial Geniculate Body", "lp": 34, "tp": 30}, {"id": 6, "ans": "Auditory Cortex", "lp": 50, "tp": 8}]
},
{
  title:"Diagram 7: Bony & Membranous Labyrinth",
  desc:"Blue = bony labyrinth; Orange/tan = membranous labyrinth",
  imgW:900, imgH:470,
  src:"vestibular-labyrinth-blanked.jpg",
  labels:[{"id": 1, "ans": "Superior Semicircular Canal", "lp": 62, "tp": 10}, {"id": 2, "ans": "Horizontal Semicircular Canal", "lp": 20, "tp": 36}, {"id": 3, "ans": "Posterior Semicircular Canal", "lp": 18, "tp": 62}, {"id": 4, "ans": "Vestibule", "lp": 52, "tp": 45}, {"id": 5, "ans": "Cochlea", "lp": 84, "tp": 55}, {"id": 6, "ans": "Oval Window", "lp": 50, "tp": 57}, {"id": 7, "ans": "Round Window", "lp": 52, "tp": 70}, {"id": 8, "ans": "Ampullae", "lp": 38, "tp": 55}]
},
{
  title:"Diagram 8: Full Ear Anatomy",
  desc:"Complete cross-section \u2014 outer, middle, and inner ear structures (Vestibular Disorders Assoc.)",
  imgW:900, imgH:613,
  src:"vestibular-labyrinth-blanked.jpg",
  labels:[{"id": 1, "ans": "External Auditory Canal", "lp": 12, "tp": 48}, {"id": 2, "ans": "Tympanic Membrane", "lp": 27, "tp": 50}, {"id": 3, "ans": "Malleus", "lp": 35, "tp": 40}, {"id": 4, "ans": "Incus", "lp": 42, "tp": 34}, {"id": 5, "ans": "Stapes", "lp": 48, "tp": 44}, {"id": 6, "ans": "Eustachian Tube", "lp": 38, "tp": 68}, {"id": 7, "ans": "Cochlea", "lp": 56, "tp": 55}, {"id": 8, "ans": "Semicircular Canals", "lp": 56, "tp": 25}, {"id": 9, "ans": "Cochlear Nerve", "lp": 65, "tp": 63}, {"id": 10, "ans": "Vestibular Nerve", "lp": 65, "tp": 52}]
},
{
  title:"Diagram 9: Ossicular Chain (Fig. 3.2)",
  desc:"The three middle-ear ossicles and associated ligaments/tendons",
  imgW:900, imgH:824,
  src:"vestibular-labyrinth-blanked.jpg",
  labels:[{"id": 1, "ans": "Malleus", "lp": 22, "tp": 32}, {"id": 2, "ans": "Head of Malleus", "lp": 28, "tp": 17}, {"id": 3, "ans": "Manubrium", "lp": 20, "tp": 48}, {"id": 4, "ans": "Umbo", "lp": 23, "tp": 57}, {"id": 5, "ans": "Tympanic Membrane", "lp": 26, "tp": 65}, {"id": 6, "ans": "Incus", "lp": 42, "tp": 22}, {"id": 7, "ans": "Stapes", "lp": 57, "tp": 42}, {"id": 8, "ans": "Footplate", "lp": 62, "tp": 50}]
},
{
  title:"Diagram 10: External Ear (Pinna)",
  desc:"Surface landmarks of the auricle",
  imgW:900, imgH:938,
  src:"vestibular-labyrinth-blanked.jpg",
  labels:[{"id": 1, "ans": "Helix", "lp": 22, "tp": 12}, {"id": 2, "ans": "Triangular Fossa", "lp": 52, "tp": 18}, {"id": 3, "ans": "Antihelix", "lp": 36, "tp": 35}, {"id": 4, "ans": "Concha", "lp": 46, "tp": 52}, {"id": 5, "ans": "Tragus", "lp": 60, "tp": 48}, {"id": 6, "ans": "External Auditory Canal", "lp": 58, "tp": 40}, {"id": 7, "ans": "Antitragus", "lp": 52, "tp": 62}, {"id": 8, "ans": "Earlobe", "lp": 46, "tp": 80}]
}
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
var cur = 0;
var selWord = null;
var states = Q.map(function(q){
  return {
    answers: {},   // markerId -> word string
    checked: false,
    results: {},   // markerId -> bool
    order: shuffle(q.labels.map(function(l){return l.ans;}))
  };
});

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(function init(){
  var total = Q.reduce(function(s,q){return s+q.labels.length;},0);
  document.getElementById('scoreTotal').textContent = total;
  var pd = document.getElementById('progress-dots');
  Q.forEach(function(_,i){
    var d = document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.id='dot'+i;
    d.title='Diagram '+(i+1);
    d.onclick=function(){go(i);};
    pd.appendChild(d);
  });
  render(0);
})();

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(idx){
  var q = Q[idx];
  var st = states[idx];
  document.getElementById('quiz-title').textContent = q.title;
  document.getElementById('quiz-desc').textContent = q.desc;

  // Build image + overlay
  var wrap = document.getElementById('diagram-wrap');
  wrap.innerHTML = '';

  var img = document.createElement('img');
  img.src = q.src;
  img.alt = q.title;
  img.draggable = false;
  wrap.appendChild(img);

  // Wait for image to lay out before placing markers
  function placeMarkers(){
    // Remove existing markers
    wrap.querySelectorAll('.mspot,.mtag').forEach(function(el){el.remove();});

    q.labels.forEach(function(lbl){
      var placed = st.answers[lbl.id];

      // Marker circle
      var m = document.createElement('div');
      m.className = 'mspot';
      m.style.left = lbl.lp + '%';
      m.style.top  = lbl.tp + '%';
      m.textContent = lbl.id;
      m.dataset.id  = lbl.id;

      if(st.checked){
        m.className += st.results[lbl.id] ? ' correct' : ' wrong';
      } else {
        m.className += placed ? ' filled' : ' empty';
      }
      m.addEventListener('click', function(){onMarker(lbl.id);});
      wrap.appendChild(m);

      // Label tag below marker (if placed)
      if(placed){
        var tag = document.createElement('div');
        tag.className = 'mtag';
        if(st.checked){
          tag.className += st.results[lbl.id] ? ' correct-tag' : ' wrong-tag';
        }
        tag.style.left = lbl.lp + '%';
        // Position tag slightly below the marker center
        tag.style.top  = 'calc(' + lbl.tp + '% + 17px)';
        var words = placed.split(' ');
        tag.textContent = words.length > 3 ? words.slice(0,3).join(' ')+'…' : placed;
        wrap.appendChild(tag);
      }
    });
  }

  if(img.complete && img.naturalWidth > 0){
    placeMarkers();
  } else {
    img.onload = placeMarkers;
  }

  buildBank(idx);

  var fb = document.getElementById('feedback');
  fb.className = ''; fb.style.display = 'none';
  document.getElementById('btnPrev').disabled  = idx===0;
  document.getElementById('btnNext').disabled  = idx===Q.length-1;
  document.getElementById('btnCheck').disabled = st.checked;
}

// ═══════════════════════════════════════════════════════════
// WORD BANK
// ═══════════════════════════════════════════════════════════
function buildBank(idx){
  var q = Q[idx], st = states[idx];
  var wb = document.getElementById('wordbank');
  // Clear existing cards (keep the label div)
  Array.from(wb.children).forEach(function(c){
    if(!c.id) c.remove();
  });
  st.order.forEach(function(word){
    var used = Object.values(st.answers).indexOf(word) >= 0;
    var card = document.createElement('div');
    card.className = 'wcard' + (used?' used':'') + (selWord===word?' sel':'');
    card.textContent = word;
    card.dataset.word = word;
    card.addEventListener('click', function(){onWord(word);});
    wb.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════════
function onWord(word){
  if(states[cur].checked) return;
  selWord = (selWord === word) ? null : word;
  buildBank(cur);
}

function onMarker(id){
  var st = states[cur];
  if(st.checked) return;
  if(selWord){
    // Un-place any existing marker that had this same word
    Object.keys(st.answers).forEach(function(k){
      if(st.answers[k]===selWord) delete st.answers[k];
    });
    st.answers[id] = selWord;
    selWord = null;
  } else if(st.answers[id]){
    // Click occupied marker with no selection = un-place it
    delete st.answers[id];
  }
  render(cur);
}

function checkAnswers(){
  var q=Q[cur], st=states[cur];
  var correct=0, total=q.labels.length;
  q.labels.forEach(function(lbl){
    var res = st.answers[lbl.id] === lbl.ans;
    st.results[lbl.id] = res;
    if(res) correct++;
  });
  st.checked = true;
  selWord = null;
  render(cur);

  // Update score
  var allCorrect = Q.reduce(function(s,_,i){
    if(!states[i].checked) return s;
    return s + Q[i].labels.filter(function(l){return states[i].results[l.id];}).length;
  },0);
  document.getElementById('scoreNum').textContent = allCorrect;

  // Dot
  var dot = document.getElementById('dot'+cur);
  dot.className = 'dot ' + (correct===total ? 'done-pass' : 'done-fail');

  var fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (correct===total?'pass':'fail');
  fb.style.display = 'block';
  if(correct===total){
    fb.textContent = '✓ Perfect — '+correct+'/'+total+' correct!';
  } else {
    fb.textContent = correct+'/'+total+' correct. Red markers are wrong — correct answer shown below them.';
  }

  // Show correct answers for wrong markers
  if(correct < total){
    var wrap = document.getElementById('diagram-wrap');
    q.labels.forEach(function(lbl){
      if(!st.results[lbl.id]){
        var tag = document.createElement('div');
        tag.className = 'mtag correct-tag';
        tag.style.left = lbl.lp + '%';
        tag.style.top  = 'calc(' + lbl.tp + '% + 30px)';
        tag.style.background = 'rgba(27,188,100,0.92)';
        tag.style.color = '#fff';
        var words = lbl.ans.split(' ');
        tag.textContent = '✓ '+(words.length>3?words.slice(0,3).join(' ')+'…':lbl.ans);
        wrap.appendChild(tag);
      }
    });
  }

  if(allChecked()) setTimeout(showFinal, 1200);
}

function resetDiagram(){
  var st = states[cur];
  st.answers = {}; st.checked = false; st.results = {};
  selWord = null;
  var dot = document.getElementById('dot'+cur);
  dot.className = 'dot' + (cur===0?' active':'');
  document.getElementById('scoreNum').textContent = Q.reduce(function(s,_,i){
    if(!states[i].checked) return s;
    return s + Q[i].labels.filter(function(l){return states[i].results[l.id];}).length;
  },0);
  render(cur);
}

function go(idx){
  if(idx<0||idx>=Q.length) return;
  document.querySelectorAll('.dot').forEach(function(d,i){
    d.classList.toggle('active', i===idx);
  });
  selWord = null;
  cur = idx;
  render(idx);
}

function allChecked(){
  return states.every(function(st){return st.checked;});
}

// ═══════════════════════════════════════════════════════════
// FINAL SCREEN
// ═══════════════════════════════════════════════════════════
function showFinal(){
  document.getElementById('main').style.display='none';
  var fin = document.getElementById('final');
  fin.className='show';
  var total = Q.reduce(function(s,q){return s+q.labels.length;},0);
  var correct = Q.reduce(function(s,q,i){
    return s + q.labels.filter(function(l){return states[i].results[l.id];}).length;
  },0);
  var pct = Math.round(correct/total*100);
  document.getElementById('final-score').textContent = correct+'/'+total+' ('+pct+'%)';
  var msgs = [
    [90,'Not bad, Va\'xul. That score is almost respectable. I spent three millennia assembling this knowledge and you\'ve retained a tolerable fraction of it. Don\'t get smug.'],
    [75,'Mediocre, but survivable. You know the canals, you can name the ossicles. The ones you missed — those are the ones that will embarrass you in clinical. Study them.'],
    [60,'Disappointing. Half-knowing auditory anatomy is like half-completing a necromantic ritual — you just get a mess. Review the diagrams you failed. Again. Slower this time.'],
    [40,'I\'ve animated skeletons with better anatomical recall than you just demonstrated. This is your exam material, Va\'xul. Not optional, not decorative. Learn it.'],
    [0,'Catastrophic. I don\'t know why I bother. Go back to diagram one and start over. Don\'t speak to me until you can label the ossicular chain in your sleep.']
  ];
  var msg = msgs[msgs.length-1][1];
  for(var i=0;i<msgs.length;i++){ if(pct>=msgs[i][0]){msg=msgs[i][1];break;} }
  document.getElementById('final-msg').textContent = msg;
}

function restart(){
  states = Q.map(function(q){
    return {answers:{},checked:false,results:{},order:shuffle(q.labels.map(function(l){return l.ans;}))};
  });
  selWord = null; cur = 0;
  document.getElementById('main').style.display='flex';
  document.getElementById('final').className='';
  document.getElementById('scoreNum').textContent='0';
  document.querySelectorAll('.dot').forEach(function(d,i){
    d.className='dot'+(i===0?' active':'');
  });
  render(0);
}
</script>
</body>
