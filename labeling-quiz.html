<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
#header{background:#16213e;padding:12px 20px;border-bottom:2px solid #4a9eff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
#header h1{font-size:1rem;color:#4a9eff;font-weight:800;letter-spacing:.03em}
#progress-dots{display:flex;gap:5px;align-items:center}
.dot{width:11px;height:11px;border-radius:50%;background:#222;border:2px solid #444;transition:all .3s;cursor:pointer}
.dot.active{border-color:#4a9eff;background:#4a9eff}
.dot.done-pass{border-color:#2ecc71;background:#2ecc71}
.dot.done-fail{border-color:#e74c3c;background:#e74c3c}
#scorebox{font-size:.85rem;color:#aaa}
#scorebox span{color:#4a9eff;font-weight:700}

#main{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;gap:14px;overflow:auto}
#quiz-header{text-align:center}
#quiz-title{font-size:1.2rem;font-weight:700;color:#4a9eff}
#quiz-desc{font-size:.8rem;color:#888;margin-top:3px}
#instructions{font-size:.78rem;color:#f39c12;background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.3);padding:6px 12px;border-radius:6px;text-align:center}

#diagram-wrap{background:#fff;border-radius:10px;padding:6px;box-shadow:0 0 25px rgba(74,158,255,.25);max-width:620px;width:100%;position:relative}
#diagram-wrap svg{width:100%;height:auto;display:block}

.mgrp{cursor:pointer}
.mgrp circle{transition:fill .2s}

#wordbank{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:680px;width:100%}
#wordbank-label{width:100%;text-align:center;font-size:.72rem;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.wcard{padding:7px 13px;border-radius:18px;background:#0f3460;border:2px solid #4a9eff;color:#ddd;cursor:pointer;font-size:.8rem;transition:all .2s;user-select:none;white-space:nowrap}
.wcard:hover:not(.used):not(.sel){background:#1a5276;transform:translateY(-1px)}
.wcard.sel{background:#e67e22;border-color:#e67e22;color:#fff;box-shadow:0 0 10px rgba(230,126,34,.5)}
.wcard.used{opacity:.28;pointer-events:none}

#feedback{padding:10px 18px;border-radius:8px;font-weight:600;text-align:center;display:none;font-size:.9rem}
#feedback.show{display:block}
#feedback.pass{background:rgba(46,204,113,.15);border:2px solid #2ecc71;color:#2ecc71}
#feedback.fail{background:rgba(231,76,60,.15);border:2px solid #e74c3c;color:#e74c3c}

#controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button{padding:9px 20px;border-radius:7px;border:none;cursor:pointer;font-size:.85rem;font-weight:700;transition:all .2s}
button:disabled{opacity:.35;cursor:default}
#btnPrev{background:#34495e;color:#fff}
#btnPrev:not(:disabled):hover{background:#2c3e50}
#btnCheck{background:#27ae60;color:#fff}
#btnCheck:not(:disabled):hover{background:#219a52}
#btnReset{background:#7f8c8d;color:#fff}
#btnReset:hover{background:#636e72}
#btnNext{background:#4a9eff;color:#fff}
#btnNext:not(:disabled):hover{background:#2980b9}

#final{display:none;flex-direction:column;align-items:center;gap:20px;padding:40px 20px;text-align:center}
#final.show{display:flex}
#final h2{font-size:2rem;color:#4a9eff}
#final-score{font-size:3.5rem;font-weight:900;color:#f1c40f}
#final-msg{font-size:1rem;color:#aaa;max-width:420px;line-height:1.5}
#btnRestart{background:#4a9eff;color:#fff;font-size:1rem;padding:12px 28px}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let cur = 0;
let selWord = null;
let states = Q.map(q => ({
  answers: {},
  checked: false,
  results: {},
  order: shuffle(q.labels.map(l=>l.ans)),
}));

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
(function init(){
  const total = Q.reduce((s,q)=>s+q.labels.length,0);
  document.getElementById('scoreTotal').textContent = total;
  const pd = document.getElementById('progress-dots');
  Q.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.id='dot'+i;
    d.title='Diagram '+(i+1);
    d.onclick=()=>go(i);
    pd.appendChild(d);
  });
  render(0);
})();

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render(idx){
  const q = Q[idx];
  const st = states[idx];
  document.getElementById('quiz-title').textContent = q.title;
  document.getElementById('quiz-desc').textContent = q.desc;

  // Build SVG
  const wrap = document.getElementById('diagram-wrap');
  wrap.innerHTML = q.svg;
  const svg = wrap.querySelector('svg');

  // Add marker groups
  q.labels.forEach(lbl=>{
    const placed = st.answers[lbl.id];
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','mgrp');
    g.setAttribute('data-id',lbl.id);

    const ci = document.createElementNS('http://www.w3.org/2000/svg','circle');
    ci.setAttribute('cx',lbl.x); ci.setAttribute('cy',lbl.y); ci.setAttribute('r','15');
    ci.setAttribute('stroke','#fff'); ci.setAttribute('stroke-width','2.5');
    if(st.checked){
      ci.setAttribute('fill', st.results[lbl.id] ? '#27ae60' : '#e74c3c');
    } else {
      ci.setAttribute('fill', placed ? '#2980b9' : '#e67e22');
    }
    g.appendChild(ci);

    const nt = document.createElementNS('http://www.w3.org/2000/svg','text');
    nt.setAttribute('x',lbl.x); nt.setAttribute('y',lbl.y);
    nt.setAttribute('text-anchor','middle'); nt.setAttribute('dominant-baseline','central');
    nt.setAttribute('fill','white'); nt.setAttribute('font-weight','bold');
    nt.setAttribute('font-size','11'); nt.setAttribute('pointer-events','none');
    nt.textContent = lbl.id;
    g.appendChild(nt);

    // Placed word label below circle
    if(placed){
      const pt = document.createElementNS('http://www.w3.org/2000/svg','text');
      pt.setAttribute('x',lbl.x); pt.setAttribute('y',lbl.y+22);
      pt.setAttribute('text-anchor','middle');
      pt.setAttribute('font-size','8.5');
      pt.setAttribute('font-weight','bold');
      pt.setAttribute('pointer-events','none');
      const col = st.checked ? (st.results[lbl.id]?'#1a6a30':'#8b0000') : '#003080';
      pt.setAttribute('fill',col);
      // truncate long labels for SVG display
      const words = placed.split(' ');
      pt.textContent = words.length>3 ? words.slice(0,2).join(' ')+'…' : placed;
      // background rect for readability
      const rb = document.createElementNS('http://www.w3.org/2000/svg','rect');
      rb.setAttribute('x',lbl.x-36); rb.setAttribute('y',lbl.y+13);
      rb.setAttribute('width','72'); rb.setAttribute('height','13');
      rb.setAttribute('rx','3'); rb.setAttribute('fill','rgba(255,255,255,0.82)');
      rb.setAttribute('pointer-events','none');
      g.appendChild(rb);
      g.appendChild(pt);
    }

    g.addEventListener('click',()=>onMarker(lbl.id));
    svg.appendChild(g);
  });

  buildBank(idx);

  // Feedback
  const fb = document.getElementById('feedback');
  fb.className=''; fb.style.display='none';

  // Buttons
  document.getElementById('btnPrev').disabled = idx===0;
  document.getElementById('btnNext').disabled = idx===Q.length-1;
  document.getElementById('btnCheck').disabled = st.checked;

  // Dots
  Q.forEach((_,i)=>{
    const d=document.getElementById('dot'+i);
    d.className='dot';
    if(i===idx) d.classList.add('active');
    else if(states[i].checked){
      const ok = Q[i].labels.every(l=>states[i].results[l.id]);
      d.classList.add(ok?'done-pass':'done-fail');
    }
  });

  selWord = null;
}

// ═══════════════════════════════════════════════════════════════
// WORD BANK
// ═══════════════════════════════════════════════════════════════
function buildBank(idx){
  const st = states[idx];
  const placed = Object.values(st.answers);
  const bank = document.getElementById('wordbank');
  Array.from(bank.querySelectorAll('.wcard')).forEach(el=>el.remove());

  st.order.forEach(word=>{
    const c = document.createElement('div');
    c.className = 'wcard' + (placed.includes(word)?' used':'');
    c.textContent = word;
    c.dataset.word = word;
    c.addEventListener('click',()=>onWord(word,c));
    bank.appendChild(c);
  });
}

// ═══════════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════════
function onWord(word, card){
  const st = states[cur];
  if(st.checked) return;
  if(Object.values(st.answers).includes(word)) return;
  document.querySelectorAll('.wcard.sel').forEach(el=>el.classList.remove('sel'));
  if(selWord===word){ selWord=null; return; }
  selWord = word;
  card.classList.add('sel');
}

function onMarker(id){
  const st = states[cur];
  if(st.checked) return;

  // If already filled → unplace
  if(st.answers[id]){
    const w = st.answers[id];
    delete st.answers[id];
    selWord = w;
    render(cur);
    // re-highlight the returned word
    document.querySelectorAll('.wcard').forEach(el=>{
      if(el.dataset.word===w){ el.classList.remove('used'); el.classList.add('sel'); }
    });
    return;
  }

  if(selWord){
    // Remove word from any other slot
    Object.keys(st.answers).forEach(k=>{ if(st.answers[k]===selWord) delete st.answers[k]; });
    st.answers[id] = selWord;
    selWord = null;
    render(cur);
  }
}

// ═══════════════════════════════════════════════════════════════
// CHECK
// ═══════════════════════════════════════════════════════════════
function checkAnswers(){
  const q = Q[cur];
  const st = states[cur];
  let correct=0;
  q.labels.forEach(lbl=>{
    const placed = (st.answers[lbl.id]||'').trim().toLowerCase();
    const ans = lbl.ans.trim().toLowerCase();
    const ok = placed===ans;
    st.results[lbl.id]=ok;
    if(ok) correct++;
  });
  st.checked=true;

  // Update running score
  const total = states.reduce((s,st2)=>s+Object.values(st2.results).filter(Boolean).length,0);
  document.getElementById('scoreNum').textContent=total;

  const fb=document.getElementById('feedback');
  const pct=correct/q.labels.length;
  fb.textContent=`${correct}/${q.labels.length} correct (${Math.round(pct*100)}%)`;
  fb.className='show '+(pct>=0.7?'pass':'fail');

  render(cur);
}

// ═══════════════════════════════════════════════════════════════
// NAV / RESET / FINAL
// ═══════════════════════════════════════════════════════════════
function go(idx){
  if(idx<0||idx>=Q.length) return;
  cur=idx;
  render(idx);
  if(states.every(s=>s.checked)) setTimeout(showFinal,600);
}

function resetDiagram(){
  states[cur]={answers:{},checked:false,results:{},order:states[cur].order};
  selWord=null;
  document.getElementById('feedback').className='';
  render(cur);
}

function showFinal(){
  document.getElementById('main').style.display='none';
  const total=states.reduce((s,st)=>s+Object.values(st.results).filter(Boolean).length,0);
  const possible=Q.reduce((s,q)=>s+q.labels.length,0);
  const pct=Math.round(total/possible*100);
  document.getElementById('final-score').textContent=`${total} / ${possible}  (${pct}%)`;
  const msgs=[
    [90,"Baldrizzt nods. Barely. That's the highest praise you'll get from a god-tier gnome."],
    [70,"Adequate. The cochlea won't reject you. Yet."],
    [50,"Mediocre. This anatomy doesn't care about your feelings. Go restudy."],
    [0,"Embarrassing. Even the earlobe knew more than you. Start over."]
  ];
  document.getElementById('final-msg').textContent=msgs.find(([t])=>pct>=t)[1];
  document.getElementById('final').classList.add('show');
}

function restart(){
  states=Q.map(q=>({answers:{},checked:false,results:{},order:shuffle(q.labels.map(l=>l.ans))}));
  cur=0; selWord=null;
  document.getElementById('scoreNum').textContent=0;
  document.getElementById('main').style.display='flex';
  document.getElementById('final').classList.remove('show');
  render(0);
}
</script>
