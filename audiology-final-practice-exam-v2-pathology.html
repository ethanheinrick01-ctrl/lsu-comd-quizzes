<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .tag-peds    { background: #1f2d3d; color: #58a6ff; }

  .tag-middle  { background: #3f3f1f; color: #d2a641; }
  .tag-ossicle { background: #2f1f3f; color: #d2a6ff; }
  .tag-imp     { background: #3f1f1f; color: #ff7b72; }
  .tag-inner   { background: #1f3f2f; color: #7ee787; }
  .tag-cochlea { background: #2a3f1f; color: #a5d6a7; }

  /* NEW PATHOLOGY TAGS */

    min-width: 28px; height: 28px; display: flex; align-items: center;
    justify-content: center; border-radius: 6px; background: #21262d;
    font-weight: 700; font-size: 0.85rem; color: #8b949e;
  }
  .option-btn.selected  { border-color: #ff6b6b; background: #1a1414; }
  .option-btn.selected .letter { background: #ff6b6b; color: #0d1117; }
  .option-btn.correct-answer { border-color: #238636; background: #0d2818; }
  .option-btn.correct-answer .letter { background: #238636; color: #fff; }
  .option-btn.wrong-answer   { border-color: #da3633; background: #2d1214; }
  .option-btn.wrong-answer .letter   { background: #da3633; color: #fff; }
  .explanation {

  }
  .explanation.show { display: block; }
  .explanation.correct-exp { background: #0d2818; border: 1px solid #238636; color: #3fb950; }
  .explanation.wrong-exp   { background: #2d1214; border: 1px solid #da3633; color: #f85149; }
  .submit-btn {

  .results-panel .big-score { font-size: 4rem; font-weight: 800; }

  .topic-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.9rem; }
  .topic-row .topic-name { color: #8b949e; }
  .topic-row .topic-score { font-weight: 700; }
  .section-divider {
    text-align: center; margin: 30px 0 20px;
    font-size: 0.75rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: #484f58;
    display: flex; align-items: center; gap: 12px;
  }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; height: 1px; background: #21262d;
  }

<div class="container">
  <div class="header">
    <h1>AUDIOLOGY FINAL — PRACTICE EXAM V2</h1>
    <p>70 Questions — PEDS + Anatomy + <strong style="color:#d580ff">PATHOLOGY</strong> — Sutherland Format · Shuffle on reload</p>

    <div class="left">Progress: <span id="answeredCount">0</span>/70</div>
    <div class="right">
      <span class="correct"  id="correctCount">0 ✓</span>
      <span class="wrong"    id="wrongCount">0 ✗</span>
      <span class="unanswered" id="unansweredCount">70 left</span>

  <div id="questionsContainer"></div>

  <div class="results-panel" id="resultsPanel">

    <div class="big-score" id="finalScore"></div>
    <div class="breakdown" id="breakdown"></div>
    <div class="topic-breakdown" id="topicBreakdown"></div>
    <div class="missed-list" id="missedList"></div>
    <button class="reset-btn" onclick="location.reload()">Retake (Reshuffle)</button>
  </div>
</div>

<script>
const allQuestions = [

  // ═══════════════════════════════════════════════
  // PEDS / UNHS / SCREENING  (Q1–Q15)
  // ═══════════════════════════════════════════════
  {
    tag: "unhs", tagLabel: "UNHS",
    q: "Per the JCIH 1-3-6 guideline, all newborns should be screened by 1 month, diagnosed by 3 months, and enrolled in early intervention by 6 months of age.",
    type: "tf", options: ["True","False"], answer: 0,
    explain: "True. Screened by 1 month, diagnosed by 3 months, early intervention by 6 months — those are MONTHS, not weeks. Yoshinaga-Itano (1998) showed that identification + intervention before 6 months produces dramatically better language outcomes."
  },
  {
    tag: "unhs", tagLabel: "UNHS",
    q: "Which terminology is CORRECT when documenting a newborn hearing screening result?",
    type: "mc",
    options: ["Pass or Fail","Negative or Positive","Pass or Refer","Clear or Blocked"],
    answer: 2,
    explain: "Pass or Refer — NEVER 'fail.' A Refer means additional diagnostic follow-up is needed; it is NOT a diagnosis of hearing loss. Many referred infants have normal hearing on full diagnostic testing."
  },
  {
    tag: "unhs", tagLabel: "UNHS",
    q: "Why is AABR preferred over OAE for newborn hearing screening in the NICU?",
    type: "mc",
    options: [
      "AABR is faster and less expensive than OAE",
      "OAEs are unreliable in noisy NICU environments",
      "AABR detects Auditory Neuropathy Spectrum Disorder (ANSD), which OAE screening alone will miss",
      "AABR provides frequency-specific threshold information"
    ],
    answer: 2,
    explain: "AABR measures the NEURAL response up through the brainstem. In ANSD, outer hair cells are intact (OAEs present) but neural transmission is disordered (ABR absent/abnormal). NICU infants have elevated ANSD risk due to hypoxia and hyperbilirubinemia — OAE-only screening will pass them and miss the disorder entirely."
  },
  {
    tag: "peds", tagLabel: "CROSS-CHECK",
    q: "The Cross-Check Principle (Jerger & Hayes, 1976) states that no single audiological measure should be the sole basis for a diagnosis — each finding must be confirmed by an independent measure.",
    type: "tf", options: ["True","False"], answer: 0,
    explain: "True. Every behavioral result must have a physiologic cross-check, and vice versa. This exists because infants cannot self-report, functional hearing loss occurs, and ANSD specifically requires cross-checking OAE with ABR to detect."
  },
  {
    tag: "peds", tagLabel: "CROSS-CHECK",
    q: "A child's behavioral audiogram shows severe SNHL bilaterally, but OAEs are clearly present in both ears. The MOST appropriate next step is:",
    type: "mc",
    options: [
      "Diagnose severe SNHL and refer for hearing aid fitting immediately",
      "Discard the OAE result — equipment error is the most likely cause",
      "Invoke the Cross-Check Principle and investigate for ANSD or functional hearing loss",
      "Repeat VRA because the child was not conditioned properly"
    ],
    answer: 2,
    explain: "Present OAEs + severe behavioral hearing loss is the textbook Cross-Check flag. Possibilities: ANSD (OHCs working but neural transmission broken), functional/non-organic loss, or testing error. You NEVER skip to diagnosis — you investigate the discrepancy first."
  },
  {
    tag: "unhs", tagLabel: "UNHS",
    q: "Before universal newborn hearing screening, the High-Risk Register approach was the standard. Which statement BEST describes its effectiveness?",
    type: "mc",
    options: [
      "It identified approximately 90% of congenital hearing losses",
      "It identified approximately 70% of cases — acceptable but not ideal",
      "It missed more than half of congenital hearing losses",
      "It performed equivalently to modern universal screening programs"
    ],
    answer: 2,
    explain: "The HRR missed >50% of congenital hearing losses because the majority of infants born with hearing loss had NO identifiable risk factor. This is why JCIH endorsed UNHS in 1994 — the risk-register approach was fundamentally inadequate."
  },
  {
    tag: "peds", tagLabel: "OAE",
    q: "Otoacoustic emissions (OAEs) are generated by the motility of outer hair cells and reflect cochlear amplifier function.",
    type: "tf", options: ["True","False"], answer: 0,
    explain: "True. The protein prestin drives rapid OHC length changes. This electromotility amplifies the traveling wave AND generates OAEs as a measurable byproduct. Absent OAEs indicate OHC dysfunction — conductive pathology blocking the signal or sensorineural damage at the OHC level."
  },
  {
    tag: "peds", tagLabel: "MRL",
    q: "In pediatric testing, the Minimum Response Level (MRL) is:",
    type: "mc",
    options: [
      "Equivalent to true hearing threshold",
      "The lowest level at which the child reliably responds — true threshold is inferred to be lower",
      "Always measured at 20 dB below PTA",
      "Used exclusively in ABR threshold estimation"
    ],
    answer: 1,
    explain: "MRL ≠ threshold. MRL is the lowest level at which you observe a reliable behavioral response. True threshold is inferred to be several dB below MRL. The gap between MRL and true threshold narrows with age — in newborns it can be 30–40 dB."
  },
  {
    tag: "unhs", tagLabel: "PREVALENCE",
    q: "Approximately how many newborns per 1,000 are born with significant hearing loss?",
    type: "mc",
    options: ["0.1 per 1,000","1–3 per 1,000","8–10 per 1,000","15–20 per 1,000"],
    answer: 1,
    explain: "1–3 per 1,000 at birth. By school age, prevalence climbs to ~5 per 1,000 due to late-onset, progressive, and acquired losses. Hearing loss is the most common sensory disability at birth."
  },
  {
    tag: "peds", tagLabel: "ABR",
    q: "ABR requires active cooperation from the patient, which makes it unsuitable for testing infants and young children.",
    type: "tf", options: ["True","False"], answer: 1,
    explain: "False — this is the OPPOSITE of why we use ABR. ABR can be performed during natural sleep or sedation because it does not require voluntary responses. This is precisely what makes it the gold standard for objective infant threshold estimation."
  },
  {
    tag: "peds", tagLabel: "ABR",
    q: "Which ABR wave component is the most robust and is used clinically for threshold estimation in infant screening?",
    type: "mc",
    options: ["Wave I","Wave III","Wave V","Wave VII"],
    answer: 2,
    explain: "Wave V — the most robust component, generated at the level of the inferior colliculus. As stimulus intensity decreases, Wave V is the last component visible before it disappears. Threshold is estimated as the lowest intensity at which Wave V can be identified."
  },
  {
    tag: "peds", tagLabel: "TYMP",
    q: "Standard 226 Hz tympanometry is NOT reliable for infants younger than:",
    type: "mc",
    options: ["3 months","6 months","9 months","12 months"],
    answer: 1,
    explain: "6 months. In infants under 6 months, the ear canal walls are highly compliant (floppy), causing 226 Hz tympanometry to produce falsely normal-appearing Type A traces even in ears with pathology. Use 1000 Hz probe tone under 6 months, then transition to 226 Hz at and after 6 months."
  },
  {
    tag: "peds", tagLabel: "ANSD",
    q: "In Auditory Neuropathy Spectrum Disorder (ANSD), OAEs are absent and the ABR is present.",
    type: "tf", options: ["True","False"], answer: 1,
    explain: "False — REVERSED. ANSD = OAEs PRESENT (OHCs are intact and functioning) + ABR ABSENT or severely abnormal (neural transmission to the brainstem is disrupted). This is the ANSD fingerprint — OAE-only screening passes these babies and misses the disorder entirely."
  },
  {
    tag: "peds", tagLabel: "OUTCOMES",
    q: "According to Yoshinaga-Itano (1998), early identification and intervention before what age leads to the best language outcomes?",
    type: "mc",
    options: ["3 months","6 months","12 months","18 months"],
    answer: 1,
    explain: "6 months. Children identified and receiving intervention before 6 months showed language development significantly closer to normal peers compared to those identified later. This single study was the empirical anchor for the JCIH 1-3-6 guideline."
  },
  {
    tag: "peds", tagLabel: "ABR",
    q: "Click-evoked ABR provides frequency-specific threshold information across the full audiometric range.",
    type: "tf", options: ["True","False"], answer: 1,
    explain: "False. Clicks are broadband stimuli that predominantly activate the 1–4 kHz region of the cochlear base. They do NOT give frequency-specific information. Tone-burst ABR (e.g., 500, 1000, 2000, 4000 Hz) is required for frequency-specific threshold estimation."
  },

  // ═══════════════════════════════════════════════
  // AGE-APPROPRIATE TESTING / VRA / MILESTONES  (Q16–Q23)
  // ═══════════════════════════════════════════════
  {
    tag: "age", tagLabel: "AGE→TEST",
    q: "What is the PRIMARY behavioral test method for a 9-month-old with no developmental delays?",
    type: "mc",
    options: ["BOA (Behavioral Observation Audiometry)","VRA (Visual Reinforcement Audiometry)","CPA (Conditioned Play Audiometry)","Conventional pure-tone audiometry"],
    answer: 1,
    explain: "VRA covers the 6-month to 2-year chronological age range. By 6 months the head-turn response is reliable enough for VRA conditioning. CPA requires the child to understand and perform a contingent motor task — not developmentally appropriate until ~2 years."
  },
  {
    tag: "age", tagLabel: "BOA",
    q: "BOA (Behavioral Observation Audiometry) is a conditioning task — the infant learns to produce a specific motor response to the sound stimulus.",
    type: "tf", options: ["True","False"], answer: 1,
    explain: "False. BOA is OBSERVATION, not conditioning. The examiner watches for reflexive/orienting behaviors (startle, eye blink, head turn, arousal from sleep, change in sucking). VRA and CPA are the conditioning paradigms — this is a classic trap she plants."
  },
  {
    tag: "vra", tagLabel: "VRA",
    q: "Per Sutherland's lecture protocol, VRA testing begins at what initial intensity?",
    type: "mc",
    options: ["30 dB HL","40 dB HL","50 dB HL","60 dB HL"],
    answer: 3,
    explain: "60 dB HL per Sutherland — NOT 30 dB HL as many textbooks state. Her class, her values. Descend 20 dB after first response, then threshold-hunt with a 10 up / 5 down or similar bracketing strategy."
  },
  {
    tag: "vra", tagLabel: "VRA",
    q: "Per Sutherland's lecture, the correct frequency testing sequence for VRA is:",
    type: "mc",
    options: [
      "1000 → 500 → 4000 → 1000 → 2000 Hz",
      "2000 → 500 → 4000 → 1000 → 250 Hz",
      "250 → 500 → 1000 → 2000 → 4000 Hz",
      "500 → 1000 → 2000 → 4000 → 8000 Hz"
    ],
    answer: 1,
    explain: "Sutherland's sequence: 2000 → 500 → 4000 → 1000 → 250 Hz. This is different from the standard textbook protocol (1000 → 500 → 4000 → 1000 → 2000). Memorize HER values exactly — those are what she tests."
  },
  {
    tag: "vra", tagLabel: "VRA",
    q: "Per Sutherland's lecture, VRA loudspeakers are positioned at what azimuth relative to the child?",
    type: "mc",
    options: ["0° (directly in front)","45°","90° (directly to the side)","135°"],
    answer: 2,
    explain: "90° azimuth per Sutherland — directly to the side. Textbooks commonly state 45°. The lit toy reinforcer is at 90° to maximize the head-turn conditioning signal. Use her value on this exam, not the textbook value."
  },
  {
    tag: "vra", tagLabel: "VRA",
    q: "Sutherland uses the term 'bone oscillators' when referring to bone conduction transducers in her lecture.",
    type: "tf", options: ["True","False"], answer: 0,
    explain: "True. Match her vocabulary exactly. If a question stem says 'bone oscillators,' you recognize it. If you see 'bone conduction transducers' on a test item, that's textbook — she may or may not use it. 'Bone oscillators' is her phrase."
  },
  {
    tag: "age", tagLabel: "CPA",
    q: "A 3.5-year-old is conditioned to drop a wooden block into a bucket each time they hear a pure tone. This behavioral audiometry technique is called:",
    type: "mc",
    options: ["BOA","VRA","CPA (Conditioned Play Audiometry)","Conventional pure-tone audiometry"],
    answer: 2,
    explain: "CPA (Conditioned Play Audiometry) — used for children approximately 2–5 years. The contingent motor task (block drop, ring stack, peg board) provides reliable frequency-specific thresholds in children who are developmentally ready for the game but not yet able to manage conventional hand-raise audiometry."
  },
  {
    tag: "age", tagLabel: "MILESTONES",
    q: "Approximately when does a typically-developing child produce their first true words?",
    type: "mc",
    options: ["6 months","9 months","12 months","18 months"],
    answer: 2,
    explain: "12 months. Sutherland explicitly stated this in her exam-content rundown: 'when do they start talking?' Earlier milestones: cooing at ~3 months, canonical babbling with intonation at ~9 months, but first true single words appear around 12 months."
  },

  // ═══════════════════════════════════════════════
  // OUTER EAR / TM / MIDDLE EAR ANATOMY  (Q24–Q33)
  // ═══════════════════════════════════════════════
  {
    tag: "outer", tagLabel: "OUTER EAR",
    q: "The adult external auditory canal (EAC) is approximately how long?",
    type: "mc",
    options: ["10 mm","15 mm","25 mm","40 mm"],
    answer: 2,
    explain: "~25 mm (~2.5 cm). The EAC functions as a quarter-wavelength resonator, providing 10–15 dB of gain centered around 2,500–3,500 Hz. This natural amplification in the high-frequency consonant range is a significant contributor to speech understanding."
  },
  {
    tag: "outer", tagLabel: "OUTER EAR",
    q: "The lateral one-third of the external auditory canal is bony, and the medial two-thirds is cartilaginous.",
    type: "tf", options: ["True","False"], answer: 1,
    explain: "False — REVERSED. Lateral 1/3 = CARTILAGINOUS (contains cerumen-producing glands, sebaceous glands, and hairs that trap particles). Medial 2/3 = BONY (thin epithelium directly over bone, no glands). This reversal is one of her favorite traps."
  },
  {
    tag: "outer", tagLabel: "EAC RESONANCE",
    q: "The external auditory canal's quarter-wavelength resonance provides approximately how much gain in the 2,500–3,500 Hz region?",
    type: "mc",
    options: ["3–5 dB","10–15 dB","20–25 dB","30+ dB"],
    answer: 1,
    explain: "10–15 dB. This resonance boosts the frequency region most critical for voiceless consonant perception (fricatives, stops). Open-canal hearing aids attempt to preserve this natural resonance by leaving the canal open."
  },
  {
    tag: "tm", tagLabel: "TM",
    q: "Which tympanic membrane landmark is located at the deepest inward point, where the tip of the manubrium of the malleus is embedded?",
    type: "mc",
    options: ["Annulus","Pars flaccida","Umbo","Cone of light"],
    answer: 2,
    explain: "Umbo — the conical peak formed by the manubrium pulling the TM inward at its tip. The annulus is the fibrous ring at the periphery. Pars flaccida (Shrapnell's membrane) is the small superior portion. Cone of light is the otoscope reflection off the TM surface in the anterior-inferior quadrant."
  },
  {
    tag: "tm", tagLabel: "TM",
    q: "The pars flaccida (Shrapnell's membrane) consists of all three layers of the tympanic membrane — epithelial, fibrous, and mucosal.",
    type: "tf", options: ["True","False"], answer: 1,
    explain: "False. Pars flaccida has only TWO layers — it lacks the middle fibrous layer. Pars tensa (the main body of the TM) has all three layers: outer epithelial (ectoderm), middle fibrous (mesoderm), inner mucosal (endoderm). No fibrous layer = no structural stiffness = 'flaccid.'"
  },
  {
    tag: "tm", tagLabel: "TM",
    q: "On otoscopy of a healthy RIGHT ear, the cone of light is located at approximately which clock position?",
    type: "mc",
    options: ["1 o'clock","5 o'clock","7 o'clock","11 o'clock"],
    answer: 1,
    explain: "5 o'clock in the RIGHT ear (anterior-inferior quadrant). 7 o'clock in the LEFT ear. The TMs are mirror images: manubrium points toward 1 o'clock (R) or 11 o'clock (L), cone of light anterior-inferior to that. PE tubes are placed in the anterior-inferior quadrant for the same reason."

    tag: "pathInner", tagLabel: "ANSD",

    type: "mc",
    options: [
      "Absent OAEs AND absent ABR",
      "Present OAEs AND absent or severely abnormal ABR",
      "Absent OAEs AND present ABR with normal morphology",
      "Present OAEs AND present ABR with elevated thresholds"
    ],
    answer: 1,
    explain: "ANSD = Present OAEs (OHCs intact and generating emissions) + Absent or severely distorted ABR (neural transmission from the cochlea to the brainstem is disrupted). The diagnosis requires BOTH components. OAE-only newborn screening WILL MISS ANSD — this is the entire rationale for AABR in NICU protocols."
  }

]; // end allQuestions

// Sanity check
if (allQuestions.length !== 70) {
  console.warn('⚠ Expected 70 questions, got ' + allQuestions.length);
}

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const questions = shuffle(allQuestions);
const TOTAL = questions.length;
const container = document.getElementById('questionsContainer');
let answered = 0, correct = 0, wrong = 0;
const userAnswers = new Array(TOTAL).fill(-1);

const tagClasses = {
  peds: 'tag-peds', unhs: 'tag-unhs', age: 'tag-age', vra: 'tag-vra',
  outer: 'tag-outer', tm: 'tag-tm', middle: 'tag-middle', ossicle: 'tag-ossicle',
  imp: 'tag-imp', inner: 'tag-inner', cochlea: 'tag-cochlea',
  hair: 'tag-hair', fluid: 'tag-fluid', prop: 'tag-prop', embryo: 'tag-embryo',
  pathOuter:  'tag-pathOuter',
  pathMiddle: 'tag-pathMiddle',
  pathInner:  'tag-pathInner',
  pathReflex: 'tag-pathReflex'
};

questions.forEach((q, i) => {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = `q${i}`;

  const typeBadge = q.type === 'tf'
    ? '<span class="q-type-badge badge-tf">T/F</span>'
    : '<span class="q-type-badge badge-mc">MC</span>';

  const topicTag = `<span class="topic-tag ${tagClasses[q.tag] || ''}">${q.tagLabel}</span>`;

  let optionsHTML = q.options.map((opt, j) => {
    const letter = q.type === 'tf' ? (j === 0 ? 'T' : 'F') : String.fromCharCode(65 + j);
    return `<button class="option-btn" data-q="${i}" data-opt="${j}" onclick="selectAnswer(${i},${j})">
      <span class="letter">${letter}</span>
      <span>${opt}</span>
    </button>`;
  }).join('');

  card.innerHTML = `
    <span class="q-number">Q${i + 1} ${typeBadge} ${topicTag}</span>
    <div class="q-text">${q.q}</div>
    <div class="options">${optionsHTML}</div>
    <div class="explanation" id="exp${i}">${q.explain}</div>
  `;
  container.appendChild(card);
});

function selectAnswer(qi, oi) {
  const card = document.getElementById(`q${qi}`);
  const btns = card.querySelectorAll('.option-btn');
  const exp  = document.getElementById(`exp${qi}`);
  if (btns[0].classList.contains('locked')) return;
  const wasUnanswered = userAnswers[qi] === -1;
  userAnswers[qi] = oi;
  btns.forEach(b => { b.classList.remove('selected','correct-answer','wrong-answer'); b.classList.add('locked'); });
  const isCorrect = oi === questions[qi].answer;
  if (isCorrect) {
    btns[oi].classList.add('correct-answer');
    card.classList.add('answered-correct');
    exp.className = 'explanation show correct-exp';
    if (wasUnanswered) correct++;
  } else {
    btns[oi].classList.add('wrong-answer');
    btns[questions[qi].answer].classList.add('correct-answer');
    card.classList.add('answered-wrong');
    exp.className = 'explanation show wrong-exp';
    if (wasUnanswered) wrong++;
  }
  if (wasUnanswered) answered++;
  updateScore();
}

function updateScore() {
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('correctCount').textContent  = correct + ' ✓';
  document.getElementById('wrongCount').textContent    = wrong   + ' ✗';
  document.getElementById('unansweredCount').textContent = (TOTAL - answered) + ' left';
}

function submitExam() {
  const missedQs = [];
  const topicStats = {};

  questions.forEach((q, i) => {
    if (!topicStats[q.tagLabel]) topicStats[q.tagLabel] = { total: 0, correct: 0 };
    topicStats[q.tagLabel].total++;

    if (userAnswers[i] === -1) {
      const card = document.getElementById(`q${i}`);
      const btns = card.querySelectorAll('.option-btn');
      const exp  = document.getElementById(`exp${i}`);
      btns.forEach(b => b.classList.add('locked'));
      btns[q.answer].classList.add('correct-answer');
      exp.className = 'explanation show wrong-exp';
      exp.innerHTML = '⚠️ UNANSWERED — ' + q.explain;
      card.classList.add('answered-wrong');
      wrong++; answered++;
      missedQs.push({ num: i + 1, topic: q.tagLabel, text: q.q.substring(0, 90) + '…' });
    } else if (userAnswers[i] !== q.answer) {
      missedQs.push({ num: i + 1, topic: q.tagLabel, text: q.q.substring(0, 90) + '…' });
    } else {
      topicStats[q.tagLabel].correct++;
    }
  });

  updateScore();

  const pct   = Math.round((correct / TOTAL) * 100);
  const grade = pct >= 93 ? 'A' : pct >= 90 ? 'A-' : pct >= 87 ? 'B+' : pct >= 83 ? 'B' : pct >= 80 ? 'B-' : pct >= 77 ? 'C+' : pct >= 73 ? 'C' : 'Below C';
  const verdicts = {
    hi:   "Lock it in. You're walking into that exam ready to carve.",
    mid:  "Solid — find the red topics below and pound them for another day.",
    low:  "Real gaps. Hit the pathology section in your study guide, then run it again.",
    ugly: "Start with the Professor DNA file and re-read pathology. One more full pass."
  };
  const v = pct >= 90 ? verdicts.hi : pct >= 80 ? verdicts.mid : pct >= 70 ? verdicts.low : verdicts.ugly;

  const panel = document.getElementById('resultsPanel');
  panel.style.display = 'block';
  document.getElementById('finalScore').textContent = `${correct}/${TOTAL} — ${pct}%`;
  document.getElementById('finalScore').style.color = pct >= 90 ? '#3fb950' : pct >= 80 ? '#58a6ff' : pct >= 70 ? '#d29922' : '#f85149';
  document.getElementById('breakdown').innerHTML = `
    Grade: <strong>${grade}</strong><br>
    Correct: ${correct} &nbsp;|&nbsp; Wrong: ${wrong}<br><br>
    ${v}
  `;

  // Sort topic breakdown worst → best
  const topicHTML = Object.keys(topicStats)
    .sort((a, b) => (topicStats[a].correct / topicStats[a].total) - (topicStats[b].correct / topicStats[b].total))
    .map(t => {
      const s    = topicStats[t];
      const tpct = Math.round((s.correct / s.total) * 100);
      const col  = tpct >= 80 ? '#3fb950' : tpct >= 60 ? '#d29922' : '#f85149';
      return `<div class="topic-row">
        <span class="topic-name">${t}</span>
        <span class="topic-score" style="color:${col}">${s.correct}/${s.total} (${tpct}%)</span>
      </div>`;
    }).join('');
  document.getElementById('topicBreakdown').innerHTML =
    '<h3 style="margin-bottom:8px;color:#d580ff">WEAK SPOTS BY TOPIC (worst → best)</h3>' + topicHTML;

  const missedDiv = document.getElementById('missedList');
  if (missedQs.length > 0) {
    missedDiv.innerHTML = `<h3>MISSED QUESTIONS (${missedQs.length})</h3>` +
      missedQs.map(m => `<div class="missed-item"><strong>Q${m.num}</strong> [${m.topic}] — ${m.text}</div>`).join('');
  } else {
    missedDiv.innerHTML = '<h3 style="color:#3fb950">PERFECT SCORE. Not bad for a bag of bones.</h3>';
  }
  panel.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
