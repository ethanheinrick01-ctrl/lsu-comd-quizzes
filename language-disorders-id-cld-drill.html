<script>
window.LANG_DIS_PAGE = {
  type: "quiz",
  course: "COMD 4382",
  title: "ID and CLD Listing Drill",
  subtitle: "Auto-graded listing, labeling, and category-boundary practice for Chapter 8 intellectual disability and CLD content.",
  sourceNote: "Use this to drill what belongs in each list, what does not belong, and which adjacent terms Dr. Gonsoulin can swap.",
  sections: [
    {
      title: "Intellectual Disability Foundations",
      desc: "Definition, criteria, supports, adaptive behavior, and cognitive processes.",
      questions: [
        { type: "mc", points: 2, topic: "ID definition", prompt: "Which definition is missing a required piece of intellectual disability?", options: ["Significant intellectual limitations plus developmental-period onset, with no adaptive-behavior evidence", "Significant intellectual limitations, significant adaptive limitations, and developmental-period onset", "Deficits in reasoning and problem solving plus adaptive limitations before adulthood", "Intellectual and adaptive-functioning limitations documented during development"], answer: 0, explanation: "The incomplete definition leaves out adaptive behavior. ID requires intellectual limitations, adaptive limitations, and developmental-period onset." },
        { type: "mc", points: 2, topic: "DSM criteria", prompt: "Which list is the most complete DSM-style ID criteria bundle?", options: ["Intellectual-function deficits, adaptive-function deficits, developmental-period onset", "Low IQ, weak grades, special education referral", "Adaptive-function deficits, known etiology, AAC need", "Language delay, poor intelligibility, classroom frustration"], answer: 0, explanation: "The professor-style boundary is that all three broad criteria are needed, not just one score, one language behavior, or one service need." },
        { type: "mc", points: 2, topic: "Adaptive behavior", prompt: "Which item does NOT belong with adaptive behavior domains?", options: ["Conceptual skills", "Social skills", "Practical skills", "Etiology label"], answer: 3, explanation: "Adaptive behavior is conceptual, social, and practical functioning. Etiology may describe cause, but it is not an adaptive behavior domain." },
        { type: "match", points: 2, topic: "Support levels", prompt: "Match the term to the best definition: intermittent support.", options: ["As-needed support", "Consistent, time-limited support", "Regular support that is not time-limited", "High-intensity support across environments"], answer: 0, explanation: "Intermittent means support is provided as needed, not constantly." },
        { type: "match", points: 2, topic: "Support levels", prompt: "Match the term to the best definition: pervasive support.", options: ["As-needed support", "Short-term support for a defined period", "High-intensity support across environments", "Only classroom-based consultation"], answer: 2, explanation: "Pervasive support is broad, consistent, and high intensity across settings." },
        { type: "mc", points: 2, topic: "Cognitive processes", prompt: "All are ID cognitive-process targets emphasized in class EXCEPT:", options: ["Attention and discrimination", "Organization", "Memory", "Phonological neighborhood density"], answer: 3, explanation: "The four-process list is attention/discrimination, organization, memory, and generalization. Phonological neighborhood density is not part of that list." },
        { type: "mc", points: 2, topic: "Cognitive trap", prompt: "A child focuses only on the first letter of a name and ignores other relevant cues. Which process is most directly implicated?", options: ["Attention/discrimination through stimulus overselectivity", "Memory storage of a taught routine", "Generalization across settings", "Organization of task steps"], answer: 0, explanation: "The key phrase is focusing on one feature while missing relevant information: stimulus overselectivity within attention/discrimination." },
        { type: "mc", points: 2, topic: "Cognitive trap", prompt: "A student follows a two-step routine during therapy but does not use it in class, home, or recess unless it is retaught. Which ID-related process is the BEST fit?", options: ["Generalization difficulty", "Memory for the original routine only", "Organization of materials only", "Attention to one irrelevant feature"], answer: 0, explanation: "The skill exists in one trained setting but does not transfer. That points most directly to generalization." },
        { type: "mc", points: 2, topic: "Teaching implications", prompt: "Which teaching implication is LEAST appropriate for children with ID?", options: ["Use explicit cues", "Break tasks into manageable chunks", "Teach strategies in the settings where they will be used", "Assume generalization will happen automatically"], answer: 3, explanation: "LEAST appropriate: automatic generalization. Instruction should be explicit, organized, and built for transfer." },
        { type: "mc", points: 2, topic: "Cognitive referencing", prompt: "Which statement is FALSE about cognitive referencing?", options: ["It denies language service when language performance matches nonverbal ability", "It is discouraged by ASHA", "It assumes language cannot improve beyond cognitive level", "It is the preferred method for deciding therapy eligibility"], answer: 3, explanation: "The false statement is that it is preferred. The study guide frames cognitive referencing as discouraged." },
        { type: "mc", points: 2, topic: "Cognitive referencing", prompt: "A school team says a child with ID should not receive language therapy because her language score is 'about where her cognition is.' What is the BEST response?", options: ["This is cognitive referencing and is discouraged for eligibility decisions", "This is a valid reason to deny service without functional language data", "This proves language cannot improve beyond nonverbal expectations", "This is the preferred ASHA eligibility shortcut"], answer: 0, explanation: "The scenario is cognitive referencing: denying language support because language and cognitive performance are similar. The trap choices repeat the discouraged logic." },
        { type: "mc", points: 2, topic: "Syndrome profiles", prompt: "Which pairing is most accurate?", options: ["Down syndrome: morphosyntax is a relative strength", "Williams syndrome: language can be a relative strength compared with nonverbal cognition", "Fragile X: no pragmatic concerns ever appear", "ID profiles are identical across etiologies"], answer: 1, explanation: "Williams syndrome is often described with relative language strengths, while the other options flatten or reverse syndrome patterns." }
      ]
    },
    {
      title: "CLD and Bilingual Assessment",
      desc: "Bilingual development, total vocabulary, assessment bias, and disorder within difference.",
      questions: [
        { type: "match", points: 2, topic: "Bilingualism", prompt: "Match the term: simultaneous bilingualism.", options: ["Two languages acquired from early childhood at the same time", "A second language learned after one language is established", "A child who cannot develop either language", "A disorder caused by exposure to two languages"], answer: 0, explanation: "Simultaneous bilingualism means both languages are acquired early; it is not a disorder." },
        { type: "match", points: 2, topic: "Bilingualism", prompt: "Match the term: sequential bilingualism.", options: ["Two languages acquired from birth only", "A second language learned after first-language development has begun", "Stopping one language to protect the other", "A language impairment label"], answer: 1, explanation: "Sequential bilingualism means the second language comes after initial first-language development." },
        { type: "mc", points: 2, topic: "Bilingualism", prompt: "Professor callout: What are the two broad types of bilingual speakers she asked for?", options: ["Simultaneous and sequential bilinguals", "Receptive and phonological bilinguals", "Expressive and pragmatic bilinguals", "Transparent and opaque bilinguals"], answer: 0, explanation: "The two broad acquisition patterns are simultaneous and sequential. Transparent/opaque belongs to AAC symbols, not bilingual speakers." },
        { type: "mc", points: 2, topic: "Bilingual theory", prompt: "The Iceberg Model of bilingualism is best described as:", options: ["Two surface languages supported by a shared underlying cognitive/linguistic base", "Two languages developing in total isolation", "A rule that families must separate languages by parent", "A reason to stop using the home language"], answer: 0, explanation: "The iceberg picture shows visible separate languages above the surface, with shared underlying proficiency below the surface." },
        { type: "mc", points: 2, topic: "Vocabulary", prompt: "Which answer BEST defines total vocabulary for a bilingual child?", options: ["Words known in only the school language", "All words known across both languages, counting translation equivalents separately", "Only words shared by both languages", "Only words that match adult pronunciation"], answer: 1, explanation: "Total vocabulary counts words across both languages and is often more informative than a single-language count." },
        { type: "mc", points: 2, topic: "Vocabulary", prompt: "Which answer BEST defines conceptual vocabulary?", options: ["Every word form across both languages", "Concepts known across languages, counting translation equivalents once", "Only vocabulary produced in English", "Only nouns in the child's home language"], answer: 1, explanation: "Conceptual vocabulary counts concepts rather than every separate word form." },
        { type: "mc", points: 2, topic: "Vocabulary", prompt: "A child says 'dog' in English and 'perro' in Spanish for the same animal. Which answer is FALSE?", options: ["Total vocabulary counts two word forms", "Conceptual vocabulary counts one concept", "Both words must be scored as a disorder because the child used two languages", "This example shows why single-language vocabulary can underrepresent bilingual knowledge"], answer: 2, explanation: "The false answer pathologizes bilingual knowledge. Total vocabulary counts both forms; conceptual vocabulary counts the shared concept once." },
        { type: "mc", points: 2, topic: "Assessment", prompt: "Which assessment practice is NOT bias-reducing for bilingual or non-mainstream English-speaking children?", options: ["Use multiple data sources", "Assess both languages when possible", "Use interpreters or cultural informants appropriately", "Assume a single-language test tells the whole story"], answer: 3, explanation: "NOT bias-reducing: the single-language shortcut. Multiple sources, both languages when possible, and informed support reduce bias." },
        { type: "mc", points: 2, topic: "Assessment", prompt: "A clinician only tests English, ignores home-language input, and compares the child directly to monolingual English peers. Which professor-style label BEST fits the problem?", options: ["Biased CLD assessment", "A complete disorder-within-difference analysis", "Dynamic assessment with contextual interpretation", "Strengths-based dialect-aware scoring"], answer: 0, explanation: "Ignoring language history and home language creates CLD assessment bias. The other choices describe better contextual approaches." },
        { type: "mc", points: 2, topic: "Disorder within difference", prompt: "Why is 'disorder within difference' better than a simple 'difference versus disorder' split?", options: ["It recognizes that a child can have a real language disorder while also using a legitimate language variety", "It says dialect features are always disorders", "It says bilingual children cannot have language disorders", "It removes the need for assessment"], answer: 0, explanation: "The point is to identify impairment within the child's linguistic context, not to label difference itself as disorder." },
        { type: "mc", points: 2, topic: "Strengths-based assessment", prompt: "Which item does NOT belong in a strengths-based CLD assessment approach?", options: ["Identify linguistic strengths", "Consider cultural and language context", "Use dynamic and functional information", "Treat non-mainstream dialect forms as automatic errors"], answer: 3, explanation: "The NOT-belonging item is treating dialect difference as error. That is exactly what strengths-based assessment resists." },
        { type: "mc", points: 2, topic: "Assigned reading", prompt: "A question asks which reading argues that bilingual children are not confused by dual input and that total vocabulary can better represent capacity. Which answer should you choose?", options: ["Hoff & Core (2015)", "Lee-James & Washington (2018)", "Oetting et al. (2021)", "Hanen More Than Words"], answer: 0, explanation: "Hoff & Core is the bilingual-development article. This tests the claim, not just author recognition." },
        { type: "mc", points: 2, topic: "Assigned reading", prompt: "Which article-specific claim is correctly matched?", options: ["Lee-James & Washington: strengths-based CLD assessment and context-aware interpretation", "Hoff & Core: PECS phases and symbol exchange prompting", "Oetting et al.: parent coaching through More Than Words", "Lee-James & Washington: transparent, translucent, and opaque AAC symbols"], answer: 0, explanation: "Lee-James & Washington is the strengths-based CLD article. The distractors are plausible course topics but wrong article pairings." },
        { type: "mc", points: 2, topic: "Assigned reading", prompt: "Oetting et al. (2021) is most closely tied to which assessment decision?", options: ["Score tense/agreement with dialect awareness instead of treating every AAE/SWE difference as an error", "Stop the home language to protect English vocabulary", "Use transparent AAC symbols before opaque ones in every case", "Choose NDBI instead of Social Stories"], answer: 0, explanation: "Oetting et al. targets dialect-aware assessment of tense/agreement, not AAC or autism intervention." },
        { type: "mc", points: 2, topic: "Assigned reading", prompt: "Which article-specific answer is strongest if she asks what Hoff & Core contributed?", options: ["Bilingual children are not confused by dual language input, languages do not have to be separated, and total vocabulary is an important capacity indicator", "The paper said therapy strategies are good", "The paper proved AAC prevents speech", "The paper was mainly about More Than Words parent coaching"], answer: 0, explanation: "The professor warned that article answers must be specific. Hoff & Core is about bilingual-development principles, not vague strategy praise or autism/AAC content." },
        { type: "tf", points: 1, topic: "CLD precision", prompt: "Bilingual children vary widely in input, dominance, and exposure patterns.", answer: 0, explanation: "True. Variability is a major theme and a likely T/F precision target." },
        { type: "tf", points: 1, topic: "CLD precision", prompt: "A bilingual child should always be compared as if they had the same language history as a monolingual peer.", answer: 1, explanation: "False. That ignores bilingual exposure and context, which is the assessment bias trap." },
        { type: "mc", points: 2, topic: "Professor trap", prompt: "All are appropriate CLD assessment considerations EXCEPT:", options: ["Gather language history", "Consider the language needed in home and school contexts", "Use culturally informed interpretation", "Evaluate only the language the clinician speaks and ignore the other language"], answer: 3, explanation: "EXCEPT format: the wrong option is the one-language-only shortcut." }
      ]
    }
  ]
};
</script>
