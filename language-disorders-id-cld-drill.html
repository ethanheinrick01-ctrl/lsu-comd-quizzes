<script>
window.LANG_DIS_PAGE = {
  type: "quiz",
  course: "COMD 4382",
  title: "ID and CLD Hard Drill",
  subtitle: "60-point focused drill with scenario traps for intellectual disability, adaptive behavior, bilingual assessment, and dialect-aware interpretation.",
  sourceNote: "Built from the final study guide style: complete criteria bundles, same-family distractors, and concrete assessment decisions.",
  sections: [
    {
      title: "Intellectual Disability",
      desc: "Criteria bundles, support intensity, adaptive domains, cognitive processes, and syndrome-profile interpretation.",
      questions: [
        { type: "tf", points: 2, topic: "ID criteria", prompt: "A child can have very low intellectual-functioning scores and still not meet intellectual disability criteria if adaptive functioning and developmental-period onset are not established.", answer: 0, explanation: "True. ID requires the criteria bundle, not one low score by itself." },
        { type: "tf", points: 2, topic: "Adaptive behavior", prompt: "Support intensity labels such as intermittent and pervasive are another way to name the conceptual, social, and practical adaptive behavior domains.", answer: 1, explanation: "False. Support intensity describes how much help is needed; adaptive behavior describes everyday functioning domains." },
        { type: "mc", points: 2, topic: "ID criteria", prompt: "A report states: low nonverbal reasoning, weak classroom problem solving, and need for repeated directions. Which missing detail most directly prevents a complete ID definition?", options: ["Whether adaptive behavior is significantly limited in everyday life", "Whether the support label would be intermittent or limited", "Whether a genetic etiology has been identified", "Whether classroom grades are lower than peer grades"], answer: 0, explanation: "The missing ID criterion is adaptive behavior in real environments. Support level, etiology, and grades do not replace the criteria bundle." },
        { type: "mc", points: 2, topic: "ID criteria", prompt: "Which profile is LEAST sufficient for identifying intellectual disability?", options: ["Significant intellectual deficits, significant adaptive deficits, developmental-period onset", "Significant reasoning deficits plus adaptive limitations documented before adulthood", "Adaptive deficits and intellectual deficits that both began during development", "A language delay with average adaptive functioning and no documented intellectual limitation"], answer: 3, explanation: "Language delay alone is not the ID criteria bundle." },
        { type: "mc", points: 2, topic: "Adaptive domains", prompt: "Which example is the best fit for the practical adaptive behavior domain rather than conceptual or social adaptive behavior?", options: ["Managing hygiene and safety routines with age-expected independence", "Understanding money concepts during a classroom task", "Interpreting a peer's intentions during recess", "Using functional academics to solve a school worksheet"], answer: 0, explanation: "Practical adaptive behavior is daily living and safety functioning. Money and academics are conceptual; peer interpretation is social." },
        { type: "mc", points: 2, topic: "Adaptive behavior", prompt: "Which statement is FALSE about adaptive behavior assessment in suspected ID?", options: ["It should reflect real-life demands, not only test-table performance", "It includes conceptual, social, and practical functioning", "It can be replaced by a single nonverbal IQ score when cognition is low", "It helps determine whether low cognition affects everyday functioning"], answer: 2, explanation: "Nonverbal IQ does not replace adaptive behavior assessment." },
        { type: "mc", points: 2, topic: "Support levels", prompt: "A child usually functions independently but needs extra help during transitions to a new classroom or after a major routine change. Which support label is the closest fit?", options: ["Intermittent support", "Limited support", "Extensive support", "Pervasive support"], answer: 0, explanation: "Intermittent support is provided as needed rather than constantly across settings." },
        { type: "mc", points: 2, topic: "Support levels", prompt: "Which support description is NOT matched correctly?", options: ["Intermittent: support as needed", "Limited: time-limited but consistent support", "Extensive: regular support in some settings without time limits", "Pervasive: brief support only during one short transition"], answer: 3, explanation: "Pervasive support is high-intensity and broad, not brief single-transition support." },
        { type: "mc", points: 2, topic: "Cognitive processes", prompt: "A student learns a sorting rule when the clinician says it aloud, but loses the rule when the materials are arranged differently. Which cognitive-process target is most directly implicated?", options: ["Generalization across materials and contexts", "Memory for the clinician's exact wording only", "Organization of a multistep routine", "Attention to one irrelevant stimulus feature"], answer: 0, explanation: "The problem is transfer of a learned rule when surface conditions change." },
        { type: "mc", points: 2, topic: "Stimulus overselectivity", prompt: "During picture sorting, a student with ID always groups by color even after the target rule changes to function. Which interpretation best fits?", options: ["Attention/discrimination difficulty through stimulus overselectivity", "Generalization of the function rule across settings", "Memory loss for a delayed classroom routine", "Organization of steps in a multiaction task"], answer: 0, explanation: "The student is overselecting one feature and missing the relevant cue." },
        { type: "mc", points: 2, topic: "Cognitive referencing", prompt: "A team denies language therapy because the child's language score is similar to the child's nonverbal cognitive score. Which critique is strongest?", options: ["That is cognitive referencing and should not be used as an eligibility shortcut", "That is the required DSM-style method for language eligibility", "That proves language intervention cannot improve functional communication", "That is disorder within difference"], answer: 0, explanation: "Cognitive referencing is the discouraged shortcut in this scenario." },
        { type: "mc", points: 2, topic: "Syndrome profiles", prompt: "A child with Williams syndrome has relatively stronger expressive language than nonverbal reasoning but struggles with everyday communication demands. Which interpretation is best?", options: ["Relative language strength can coexist with functional communication needs", "The child no longer needs adaptive behavior assessment", "The syndrome profile proves language is always age typical", "Nonverbal cognition becomes irrelevant"], answer: 0, explanation: "A relative strength does not erase functional needs." },
        { type: "mc", points: 2, topic: "Etiology", prompt: "Which pair is the most reasonable same-unit match?", options: ["Lead exposure: possible cognitive skill loss", "Lead exposure: relative expressive-language strength profile", "Williams syndrome: automatic denial of functional communication needs", "Cognitive referencing: documenting adaptive behavior domains"], answer: 0, explanation: "Lead exposure belongs with cognitive effects. The other pairs distort nearby ID concepts." },
        { type: "match", points: 2, topic: "ID terms", prompt: "Definition: conceptual, social, and practical functioning used to meet everyday environmental demands.", options: ["Adaptive behavior", "Support intensity", "Cognitive referencing", "Stimulus overselectivity"], answer: 0, explanation: "Adaptive behavior is the everyday functioning construct." },
        { type: "match", points: 2, topic: "ID terms", prompt: "Definition: denying or limiting language intervention because language ability is judged to match cognitive level.", options: ["Cognitive referencing", "Generalization", "Pervasive support", "Dynamic assessment"], answer: 0, explanation: "Cognitive referencing ties service decisions to language-cognition consistency." }
      ]
    },
    {
      title: "CLD and Bilingual Assessment",
      desc: "Bilingual development, vocabulary scoring, disorder-within-difference, and strengths-based assessment.",
      questions: [
        { type: "tf", points: 2, topic: "Bilingualism", prompt: "A bilingual child can show different skill levels across languages because exposure, use, and dominance vary by context.", answer: 0, explanation: "True. Bilingual profiles are shaped by language history and context." },
        { type: "tf", points: 2, topic: "Assessment bias", prompt: "A low English vocabulary score is enough by itself to identify disorder in a bilingual child when the clinician does not speak the home language.", answer: 1, explanation: "False. English-only evidence without language-history context is a bias trap." },
        { type: "mc", points: 2, topic: "Bilingual types", prompt: "A child hears Spanish from birth at home and begins regular English exposure in preschool after Spanish is already established. Which label is most precise?", options: ["Sequential bilingualism", "Simultaneous bilingualism", "Conceptual vocabulary", "Disorder within difference"], answer: 0, explanation: "The second language comes after first-language development has begun." },
        { type: "mc", points: 2, topic: "Iceberg model", prompt: "Which statement is LEAST consistent with the bilingual Iceberg Model?", options: ["Surface languages can look separate", "Languages share underlying cognitive-linguistic proficiency", "Home language knowledge can support overall language capacity", "Each language develops in total isolation with no shared base"], answer: 3, explanation: "The model is about shared underlying proficiency, not isolated systems." },
        { type: "mc", points: 2, topic: "Vocabulary scoring", prompt: "A child says 'shoe,' 'zapato,' 'cup,' 'vaso,' and 'ball' only in English. Translation pairs refer to shared concepts. Which scoring is correct?", options: ["Total vocabulary = 5, conceptual vocabulary = 3", "Total vocabulary = 3, conceptual vocabulary = 5", "Total vocabulary = 2, conceptual vocabulary = 0", "Total vocabulary and conceptual vocabulary must be identical"], answer: 0, explanation: "There are five word forms but three concepts: shoe, cup, and ball." },
        { type: "mc", points: 2, topic: "Vocabulary scoring", prompt: "Which statement is FALSE about total and conceptual vocabulary?", options: ["Total vocabulary can reveal word forms known across both languages", "Conceptual vocabulary counts translation equivalents once", "Conceptual vocabulary is useful because bilingual knowledge can be split across languages", "Translation equivalents must always be counted as evidence of disorder"], answer: 3, explanation: "Translation equivalents are not disorder evidence by themselves." },
        { type: "mc", points: 2, topic: "CLD assessment", prompt: "A clinician uses an interpreter, gathers language history, samples both languages when possible, and compares performance to language exposure. Which label best fits the approach?", options: ["Context-aware CLD assessment", "English-only monolingual norming shortcut", "Parent opinion replacing all language data", "Dialect difference treated as automatic disorder"], answer: 0, explanation: "The approach reduces bias by interpreting language in context." },
        { type: "mc", points: 2, topic: "Assessment bias", prompt: "Which practice is MOST likely to overidentify impairment in a CLD child?", options: ["Treating dialect differences from Mainstream American English as automatic errors", "Checking whether a form is expected in the child's dialect", "Using more than one data source", "Considering language demands at home and school"], answer: 0, explanation: "Pathologizing dialect difference is the overidentification trap." },
        { type: "mc", points: 2, topic: "Disorder within difference", prompt: "A bilingual child uses expected home-language transfer patterns but also has difficulty learning new forms in both languages despite support. Which framing is strongest?", options: ["Evaluate for possible disorder within difference", "Dismiss all concerns because bilingualism explains everything", "Score only English because school uses English", "Stop home-language input before assessment"], answer: 0, explanation: "A valid language difference does not rule out a real impairment." },
        { type: "mc", points: 2, topic: "Strengths-based CLD", prompt: "Which option is NOT consistent with strengths-based CLD assessment?", options: ["Documenting what the child can do in either language", "Considering cultural and linguistic experience", "Treating the family's language as an obstacle to remove", "Using functional information in addition to test scores"], answer: 2, explanation: "The family language is not treated as a defect in strengths-based assessment." },
        { type: "mc", points: 2, topic: "Dialect scoring", prompt: "A child uses an AAE/SWE tense-agreement pattern expected in the child's dialect. What is the strongest scoring decision?", options: ["Do not automatically score the dialect-consistent form as an error", "Mark every nonmainstream form wrong to keep scoring simple", "Diagnose impairment from the dialect form alone", "Ignore syntax because dialect speakers do not use grammar"], answer: 0, explanation: "Dialect-aware scoring avoids treating dialect-consistent variation as disorder." },
        { type: "mc", points: 2, topic: "Article claims", prompt: "Which claim best fits the bilingual-development reading target without turning into author-name trivia?", options: ["Dual-language exposure does not confuse children, languages do not need to be separated, and total vocabulary can show capacity", "Families should separate languages by speaker so children do not mix systems", "Low English vocabulary should be interpreted without considering home-language knowledge", "Conceptual vocabulary should count each translation equivalent as a separate concept"], answer: 0, explanation: "That is the specific bilingual-development claim rather than a bilingual-myth distractor." },
        { type: "mc", points: 2, topic: "Article claims", prompt: "Which article-style claim is mismatched?", options: ["Hoff & Core: bilingual children are confused unless parents separate languages", "Lee-James & Washington: strengths-based CLD assessment", "Oetting et al.: dialect-aware tense/agreement scoring", "Hoff & Core: total vocabulary can be informative for bilingual children"], answer: 0, explanation: "The mismatch is the old myth that bilingual input confuses children." },
        { type: "match", points: 2, topic: "CLD terms", prompt: "Definition: evaluating possible impairment within the child's legitimate language or dialect context.", options: ["Disorder within difference", "Language difference only", "Assessment bias", "Sequential bilingualism"], answer: 0, explanation: "Disorder within difference keeps the language context while still evaluating impairment." },
        { type: "match", points: 2, topic: "Vocabulary terms", prompt: "Definition: counting known concepts across languages, with translation equivalents counted once.", options: ["Conceptual vocabulary", "Total vocabulary", "Sequential bilingualism", "Dialect scoring"], answer: 0, explanation: "Conceptual vocabulary counts concepts, not every word form." }
      ]
    }
  ]
};
</script>
