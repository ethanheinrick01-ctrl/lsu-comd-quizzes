<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMD 4190 - Audiology Labeling Quiz</title>
<style>
:root{
  --bg:#0b1020;
  --panel:#121a2a;
  --panel-2:#17233a;
  --ink:#eef5ff;
  --muted:#9ba9bb;
  --line:#2b3a52;
  --blue:#4a9eff;
  --blue-2:#0f3460;
  --green:#29b765;
  --red:#e84d4d;
  --amber:#f2a321;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:var(--bg);
  color:var(--ink);
  font-family:Inter,Segoe UI,system-ui,-apple-system,sans-serif;
}
button,select{font:inherit}
#app{min-height:100vh;display:flex;flex-direction:column}
#header{
  position:sticky;top:0;z-index:5;
  display:grid;grid-template-columns:minmax(220px,1fr) auto minmax(140px,auto);
  gap:16px;align-items:center;
  padding:14px 22px;
  background:rgba(18,26,42,.96);
  border-bottom:2px solid var(--blue);
  backdrop-filter:blur(12px);
}
#header h1{font-size:1.05rem;color:var(--blue);font-weight:850;letter-spacing:.01em}
#progress-dots{display:flex;gap:7px;align-items:center;justify-content:center;flex-wrap:wrap}
.dot{
  width:13px;height:13px;border-radius:999px;
  border:2px solid #586273;background:#20293a;
  cursor:pointer;transition:transform .15s, background .15s, border-color .15s;
}
.dot:hover{transform:scale(1.15)}
.dot.active{border-color:var(--blue);background:var(--blue)}
.dot.done-pass{border-color:var(--green);background:var(--green)}
.dot.done-fail{border-color:var(--red);background:var(--red)}
#scorebox{text-align:right;color:var(--muted);font-weight:750}
#scorebox span{color:var(--blue)}
#main{
  width:min(1500px,100%);
  margin:0 auto;
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:18px;
}
#quiz-header{text-align:center}
#quiz-title{font-size:clamp(1.6rem,3vw,2.45rem);font-weight:900;color:var(--blue);line-height:1.05}
#quiz-desc{margin-top:6px;color:var(--muted);font-size:1rem}
#instructions{
  align-self:center;
  color:#ffd48a;
  border:1px solid rgba(242,163,33,.42);
  background:rgba(242,163,33,.10);
  border-radius:8px;
  padding:10px 14px;
  font-size:.92rem;
  font-weight:750;
}
.workspace{
  display:grid;
  grid-template-columns:minmax(0,1.1fr) minmax(360px,.9fr);
  gap:18px;
  align-items:start;
}
#diagram-wrap{
  background:#f7f7f5;
  border:8px solid #fff;
  border-radius:14px;
  box-shadow:0 18px 42px rgba(0,0,0,.38),0 0 0 1px rgba(74,158,255,.24);
  overflow:auto;
  max-height:calc(100vh - 210px);
}
#diagram-wrap img{
  display:block;
  width:100%;
  height:auto;
  min-width:640px;
}
.answer-panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 14px 28px rgba(0,0,0,.22);
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 16px;
  border-bottom:1px solid var(--line);
  background:var(--panel-2);
}
.panel-head h2{font-size:1rem;color:var(--ink)}
#diagram-count{font-size:.82rem;color:var(--muted);font-weight:800}
#slots{display:grid;grid-template-columns:1fr;gap:9px;padding:14px}
.slot{
  display:grid;grid-template-columns:42px minmax(0,1fr);
  gap:10px;align-items:center;
  padding:9px;
  border:1px solid var(--line);
  border-radius:9px;
  background:#0d1524;
}
.num{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:999px;
  background:var(--blue-2);
  border:2px solid var(--blue);
  color:#fff;font-weight:900;
}
.slot select{
  width:100%;
  min-height:38px;
  border-radius:7px;
  border:1px solid #40516e;
  background:#0a111d;
  color:var(--ink);
  padding:7px 9px;
}
.slot.correct{border-color:rgba(41,183,101,.8);background:rgba(41,183,101,.08)}
.slot.wrong{border-color:rgba(232,77,77,.9);background:rgba(232,77,77,.08)}
.correct-answer{
  grid-column:2;
  margin-top:-4px;
  color:#9ff0bb;
  font-size:.82rem;
  font-weight:800;
}
#wordbank{
  display:flex;flex-wrap:wrap;gap:8px;
  padding:0 14px 14px;
}
#wordbank-label{
  width:100%;
  color:var(--muted);
  font-size:.74rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-top:2px;
}
.wcard{
  border:1px solid rgba(74,158,255,.65);
  background:rgba(74,158,255,.13);
  color:#d8e9ff;
  border-radius:999px;
  padding:7px 10px;
  font-size:.82rem;
  font-weight:750;
}
#feedback{
  display:none;
  border-radius:10px;
  padding:12px 14px;
  font-weight:850;
  text-align:center;
}
#feedback.show{display:block}
#feedback.pass{background:rgba(41,183,101,.12);border:1px solid rgba(41,183,101,.75);color:#93efb4}
#feedback.fail{background:rgba(232,77,77,.12);border:1px solid rgba(232,77,77,.75);color:#ffb0b0}
#controls{
  position:sticky;
  bottom:0;
  z-index:4;
  display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
  padding:14px 12px;
  background:linear-gradient(180deg,rgba(11,16,32,0),rgba(11,16,32,.98) 22%);
}
button{
  border:0;border-radius:9px;
  padding:11px 18px;
  cursor:pointer;
  color:#fff;
  font-weight:900;
  transition:transform .15s, filter .15s, opacity .15s;
}
button:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.06)}
button:disabled{opacity:.42;cursor:default}
#btnPrev{background:#34475f}
#btnNext,#btnRestart{background:var(--blue)}
#btnCheck{background:var(--green)}
#btnReset{background:#7f8c8d}
#final{
  display:none;
  flex:1;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
}
#final.show{display:flex}
.final-card{
  width:min(620px,100%);
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:14px;
  padding:28px;
  box-shadow:0 18px 44px rgba(0,0,0,.28);
}
.final-card h2{font-size:2rem;color:var(--blue)}
#final-score{margin:14px 0;font-size:3.2rem;font-weight:950;color:#ffd45c}
#final-msg{color:var(--muted);line-height:1.55;margin-bottom:18px}
@media (max-width:980px){
  #header{grid-template-columns:1fr;justify-items:center;text-align:center}
  #scorebox{text-align:center}
  #main{padding:16px}
  .workspace{grid-template-columns:1fr}
  #diagram-wrap{max-height:none}
  #diagram-wrap img{min-width:0}
}
@media (max-width:520px){
  #main{padding:12px}
  #instructions{font-size:.82rem}
  .slot{grid-template-columns:34px minmax(0,1fr);gap:8px}
  .num{width:30px;height:30px}
  #controls button{flex:1 1 42%;padding:10px 12px}
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>COMD 4190 - Audiology Labeling Quiz</h1>
    <div id="progress-dots"></div>
    <div id="scorebox">Score: <span id="scoreNum">0</span> / <span id="scoreTotal">0</span></div>
  </div>

  <main id="main">
    <div id="quiz-header">
      <div id="quiz-title"></div>
      <div id="quiz-desc"></div>
    </div>
    <div id="instructions">Use the red numbers on the diagram. Pick the matching term for each number, then check answers.</div>
    <section class="workspace">
      <div id="diagram-wrap"></div>
      <aside class="answer-panel">
        <div class="panel-head">
          <h2>Numbered Answers</h2>
          <div id="diagram-count"></div>
        </div>
        <div id="slots"></div>
        <div id="wordbank"><div id="wordbank-label">Word Bank</div></div>
      </aside>
    </section>
    <div id="feedback"></div>
    <div id="controls">
      <button id="btnPrev" onclick="go(cur-1)">Prev</button>
      <button id="btnCheck" onclick="checkAnswers()">Check Answers</button>
      <button id="btnReset" onclick="resetDiagram()">Reset</button>
      <button id="btnNext" onclick="go(cur+1)">Next</button>
    </div>
  </main>

  <section id="final">
    <div class="final-card">
      <h2>Quiz Complete</h2>
      <div id="final-score"></div>
      <div id="final-msg"></div>
      <button id="btnRestart" onclick="restart()">Try Again</button>
    </div>
  </section>
</div>

<script>
const Q = [
  {
    title:"Diagram 1: Vestibular Labyrinth",
    desc:"Semicircular canals, otolith organs, and cochlea",
    src:"useme_diagrams/diagram_01.png",
    labels:[
      {number:1, answer:"Posterior Canal"},
      {number:2, answer:"Anterior Canal", aliases:["Superior Canal"]},
      {number:3, answer:"Utricle"},
      {number:4, answer:"Saccule"},
      {number:5, answer:"Cochlea"},
      {number:6, answer:"Horizontal Canal"}
    ]
  },
  {
    title:"Diagram 2: Vestibular System - Detailed",
    desc:"Semicircular canals, ampullae, otolith organs, and CN VIII branches",
    src:"useme_diagrams/diagram_02.png",
    labels:[
      {number:1, answer:"Posterior Canal"},
      {number:2, answer:"Superior Canal"},
      {number:3, answer:"Ampullae"},
      {number:4, answer:"Utricle"},
      {number:5, answer:"Sacculus"},
      {number:6, answer:"Superior Ganglion of Scarpa"},
      {number:7, answer:"Inferior Ganglion of Scarpa"},
      {number:8, answer:"Vestibular Nerve"},
      {number:9, answer:"Ganglia Scarpae", aliases:["Vestibular Ganglion"]},
      {number:10, answer:"Facial Nerve"},
      {number:11, answer:"Cochlear Nerve"},
      {number:12, answer:"Ampulla"},
      {number:13, answer:"Horizontal Canal"},
      {number:14, answer:"Posterior Canal"}
    ]
  },
  {
    title:"Diagram 3: Unrolling of the Cochlea",
    desc:"Cochlear base, basilar membrane, and the unrolled cochlea",
    src:"useme_diagrams/diagram_03.png",
    labels:[
      {number:1, answer:"Cochlear Base"},
      {number:2, answer:"Basilar Membrane"},
      {number:3, answer:"Unrolled Cochlea"},
      {number:4, answer:"Unrolling of Cochlea"},
      {number:5, answer:"Basilar Membrane"}
    ]
  },
  {
    title:"Diagram 4: Basilar Membrane Tuning",
    desc:"Tonotopic map of the cochlear spiral",
    src:"useme_diagrams/diagram_04.png",
    labels:[
      {number:1, answer:"More Stiff"},
      {number:2, answer:"Low Frequencies / Less Stiff", aliases:["Low Frequencies","Less Stiff"]},
      {number:3, answer:"Helicotrema"},
      {number:4, answer:"Wide Apex"},
      {number:5, answer:"High Frequencies"},
      {number:6, answer:"Narrow Basal End"},
      {number:7, answer:"Vestibule"}
    ]
  },
  {
    title:"Diagram 5: Bony and Membranous Labyrinth",
    desc:"Blue is bony labyrinth; orange/tan is membranous labyrinth",
    src:"useme_diagrams/diagram_05.png",
    labels:[
      {number:1, answer:"Endolymph"},
      {number:2, answer:"Superior Semicircular Canal"},
      {number:3, answer:"Superior Semicircular Duct"},
      {number:4, answer:"Vestibule"},
      {number:5, answer:"Cochlea"},
      {number:6, answer:"Cochlear Duct"},
      {number:7, answer:"Round Window"},
      {number:8, answer:"Oval Window"},
      {number:9, answer:"Posterior Semicircular Duct"},
      {number:10, answer:"Posterior Semicircular Canal"},
      {number:11, answer:"Horizontal Semicircular Duct"},
      {number:12, answer:"Horizontal Semicircular Canal"},
      {number:13, answer:"Perilymph"}
    ]
  },
  {
    title:"Diagram 6: Organ of Corti",
    desc:"Cochlear duct cross-section and hair-cell structures",
    src:"useme_diagrams/diagram_06.png",
    labels:[
      {number:1, answer:"Cochlear Nerve"},
      {number:2, answer:"Basilar Membrane"},
      {number:3, answer:"Organ of Corti"},
      {number:4, answer:"Tectorial Membrane"},
      {number:5, answer:"Scala Media"},
      {number:6, answer:"Outer Phalangeal Cell"},
      {number:7, answer:"Tectorial Membrane"},
      {number:8, answer:"Outer Hair Cell"},
      {number:9, answer:"Inner Tunnel"},
      {number:10, answer:"Inner Hair Cell"},
      {number:11, answer:"Inner Pillar Cell"},
      {number:12, answer:"Basilar Membrane"},
      {number:13, answer:"Nerve Fiber"},
      {number:14, answer:"Outer Pillar Cell"}
    ]
  },
  {
    title:"Diagram 7: Central Auditory Pathway",
    desc:"Ascending bilateral pathway from cochlea to cortex",
    src:"useme_diagrams/diagram_07.png",
    labels:[
      {number:1, answer:"Cochlea"},
      {number:2, answer:"Cochlear Nucleus"},
      {number:3, answer:"Superior Olive"},
      {number:4, answer:"Inferior Colliculus"},
      {number:5, answer:"Medial Geniculate Body"},
      {number:6, answer:"Auditory Cortex"}
    ]
  },
  {
    title:"Diagram 8: Full Ear Anatomy",
    desc:"Outer, middle, and inner ear structures",
    src:"useme_diagrams/diagram_08.png",
    labels:[
      {number:1, answer:"External Auditory Canal"},
      {number:2, answer:"Tympanic Membrane", aliases:["Eardrum"]},
      {number:3, answer:"Malleus"},
      {number:4, answer:"Incus"},
      {number:5, answer:"Stapes"},
      {number:6, answer:"Ligament"},
      {number:7, answer:"Eustachian Tube"},
      {number:8, answer:"Oval Window"},
      {number:9, answer:"Round Window"},
      {number:10, answer:"Cochlea"},
      {number:11, answer:"Cochlear Nerve"},
      {number:12, answer:"Semicircular Canals"},
      {number:13, answer:"Utricle"},
      {number:14, answer:"Saccule"},
      {number:15, answer:"Endolymphatic Sac"},
      {number:16, answer:"Vestibular Nerve"},
      {number:17, answer:"Facial Nerve"},
      {number:18, answer:"Temporal Bone"},
      {number:19, answer:"Muscle"},
      {number:20, answer:"Cartilage"},
      {number:21, answer:"Internal Auditory Canal to Brain", aliases:["Internal Auditory Canal"]}
    ]
  },
  {
    title:"Diagram 9: External Ear / Pinna",
    desc:"Surface landmarks of the auricle",
    src:"useme_diagrams/diagram_09.png",
    labels:[
      {number:1, answer:"Helix"},
      {number:2, answer:"Antihelix"},
      {number:3, answer:"Concha"},
      {number:4, answer:"Antitragus"},
      {number:5, answer:"Earlobe"},
      {number:6, answer:"Tragus"},
      {number:7, answer:"External Auditory Canal"},
      {number:8, answer:"Triangular Fossa"}
    ]
  },
  {
    title:"Diagram 10: Ossicular Chain",
    desc:"The three middle-ear ossicles and associated ligaments/tendons",
    src:"useme_diagrams/diagram_10.png",
    labels:[
      {number:1, answer:"Lateral Process"},
      {number:2, answer:"Anterior Process"},
      {number:3, answer:"Manubrium"},
      {number:4, answer:"Umbo"},
      {number:5, answer:"Tympanic Membrane"},
      {number:6, answer:"Stapes"},
      {number:7, answer:"Footplate"},
      {number:8, answer:"Long Crus"},
      {number:9, answer:"Tendon of Tensor Tympani"},
      {number:10, answer:"Incus"},
      {number:11, answer:"Superior Ligament"},
      {number:12, answer:"Head of Malleus"},
      {number:13, answer:"Malleus"},
      {number:14, answer:"Epitympanic Recess"},
      {number:15, answer:"Lateral Ligament"}
    ]
  }
];

let cur = 0;
let states = Q.map(makeState);

function makeState(q){
  return {answers:{}, checked:false, results:{}, order:shuffle(q.labels.map(l => l.answer))};
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function uniqueAnswers(q){
  return Array.from(new Set(q.labels.flatMap(l => [l.answer].concat(l.aliases || [])))).sort((a,b) => a.localeCompare(b));
}

function normalize(value){
  return String(value || '').trim().toLowerCase().replace(/\s+/g,' ');
}

function isCorrect(label, value){
  const accepted = [label.answer].concat(label.aliases || []).map(normalize);
  return accepted.includes(normalize(value));
}

function totalLabels(){
  return Q.reduce((sum,q) => sum + q.labels.length, 0);
}

function checkedScore(){
  return Q.reduce((sum,q,i) => {
    if(!states[i].checked) return sum;
    return sum + q.labels.filter(l => states[i].results[l.number]).length;
  }, 0);
}

function init(){
  document.getElementById('scoreTotal').textContent = totalLabels();
  const dots = document.getElementById('progress-dots');
  Q.forEach((_,i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.id = 'dot' + i;
    dot.type = 'button';
    dot.title = 'Diagram ' + (i + 1);
    dot.setAttribute('aria-label','Diagram ' + (i + 1));
    dot.onclick = () => go(i);
    dots.appendChild(dot);
  });
  render(0);
}

function render(idx){
  const q = Q[idx];
  const st = states[idx];
  document.getElementById('quiz-title').textContent = q.title;
  document.getElementById('quiz-desc').textContent = q.desc;
  document.getElementById('diagram-count').textContent = q.labels.length + ' labels';

  const wrap = document.getElementById('diagram-wrap');
  wrap.innerHTML = '';
  const img = document.createElement('img');
  img.src = q.src;
  img.alt = q.title;
  img.draggable = false;
  wrap.appendChild(img);

  buildSlots(idx);
  buildBank(idx);

  const fb = document.getElementById('feedback');
  fb.className = '';
  fb.style.display = 'none';

  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === Q.length - 1;
  document.getElementById('btnCheck').disabled = st.checked;
}

function buildSlots(idx){
  const q = Q[idx], st = states[idx];
  const choices = uniqueAnswers(q);
  const slots = document.getElementById('slots');
  slots.innerHTML = '';

  q.labels.forEach(label => {
    const row = document.createElement('div');
    row.className = 'slot';
    if(st.checked) row.classList.add(st.results[label.number] ? 'correct' : 'wrong');

    const num = document.createElement('div');
    num.className = 'num';
    num.textContent = label.number;
    row.appendChild(num);

    const select = document.createElement('select');
    select.disabled = st.checked;
    select.dataset.number = label.number;
    const empty = document.createElement('option');
    empty.value = '';
    empty.textContent = 'Choose term...';
    select.appendChild(empty);
    choices.forEach(choice => {
      const opt = document.createElement('option');
      opt.value = choice;
      opt.textContent = choice;
      select.appendChild(opt);
    });
    select.value = st.answers[label.number] || '';
    select.addEventListener('change', e => {
      st.answers[label.number] = e.target.value;
    });
    row.appendChild(select);

    if(st.checked && !st.results[label.number]){
      const correct = document.createElement('div');
      correct.className = 'correct-answer';
      correct.textContent = 'Correct: ' + label.answer;
      row.appendChild(correct);
    }
    slots.appendChild(row);
  });
}

function buildBank(idx){
  const q = Q[idx], st = states[idx];
  const wb = document.getElementById('wordbank');
  wb.innerHTML = '<div id="wordbank-label">Word Bank</div>';
  st.order.forEach(term => {
    const card = document.createElement('div');
    card.className = 'wcard';
    card.textContent = term;
    wb.appendChild(card);
  });
}

function checkAnswers(){
  const q = Q[cur], st = states[cur];
  let correct = 0;
  q.labels.forEach(label => {
    const ok = isCorrect(label, st.answers[label.number]);
    st.results[label.number] = ok;
    if(ok) correct++;
  });
  st.checked = true;
  render(cur);

  document.getElementById('scoreNum').textContent = checkedScore();
  const dot = document.getElementById('dot' + cur);
  dot.className = 'dot ' + (correct === q.labels.length ? 'done-pass active' : 'done-fail active');

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (correct === q.labels.length ? 'pass' : 'fail');
  fb.style.display = 'block';
  fb.textContent = correct === q.labels.length
    ? 'Perfect - ' + correct + '/' + q.labels.length + ' correct.'
    : correct + '/' + q.labels.length + ' correct. Corrections are shown beside missed numbers.';

  if(states.every(s => s.checked)) window.setTimeout(showFinal, 800);
}

function resetDiagram(){
  states[cur] = makeState(Q[cur]);
  document.getElementById('scoreNum').textContent = checkedScore();
  const dot = document.getElementById('dot' + cur);
  dot.className = 'dot active';
  render(cur);
}

function go(idx){
  if(idx < 0 || idx >= Q.length) return;
  document.querySelectorAll('.dot').forEach((dot,i) => {
    dot.classList.toggle('active', i === idx);
  });
  cur = idx;
  render(idx);
}

function showFinal(){
  document.getElementById('main').style.display = 'none';
  const final = document.getElementById('final');
  final.className = 'show';
  const correct = checkedScore();
  const total = totalLabels();
  const pct = Math.round(correct / total * 100);
  document.getElementById('final-score').textContent = correct + '/' + total + ' (' + pct + '%)';
  let msg = 'Start over and drill the missed diagrams.';
  if(pct >= 90) msg = 'Strong pass. The anatomy set is under control.';
  else if(pct >= 75) msg = 'Usable score, but the missed labels are still exam bait.';
  else if(pct >= 60) msg = 'Borderline. Review every missed diagram before moving on.';
  else if(pct >= 40) msg = 'Too many weak spots. Redo the set slowly.';
  document.getElementById('final-msg').textContent = msg;
}

function restart(){
  states = Q.map(makeState);
  cur = 0;
  document.getElementById('main').style.display = 'flex';
  document.getElementById('final').className = '';
  document.getElementById('scoreNum').textContent = '0';
  document.querySelectorAll('.dot').forEach((dot,i) => {
    dot.className = 'dot' + (i === 0 ? ' active' : '');
  });
  render(0);
}

init();
</script>
</body>
</html>
