      questions: [
        { type: "mc", points: 2, topic: "DSM criteria", prompt: "Which statement is FALSE about the DSM-style ASD diagnostic picture?", options: ["Persistent social communication/social interaction deficits are part of the picture", "Restricted, repetitive patterns of behavior, interests, or activities are part of the picture", "Symptoms are present during the developmental period", "Purely motor delay with no social-communication concern is enough by itself"], answer: 3, explanation: "FALSE: a motor delay alone is not ASD. The core picture includes social communication/social interaction plus restricted/repetitive patterns, with developmental-period onset." },
        { type: "mc", points: 2, topic: "Diagnostic trap", prompt: "Which statement is FALSE about ASD diagnosis?", options: ["Restricted and repetitive behaviors are part of the criteria", "Symptoms can vary widely across individuals", "A language delay by itself is enough for ASD", "Social communication differences are central"], answer: 2, explanation: "Language delay alone is not sufficient. The trap is confusing one possible feature with the full diagnosis." },
        { type: "mc", points: 2, topic: "Early signs", prompt: "Which item is LEAST consistent with early ASD risk signs?", options: ["Reduced response to name", "Limited imitation or pretend play", "Limited joint attention", "Advanced pretend play with strong social sharing"], answer: 3, explanation: "LEAST consistent: strong shared pretend play. Early concern centers on response to name, joint attention, imitation, play, and shared engagement." },

        { type: "mc", points: 2, topic: "Kennedy Krieger", prompt: "A toddler intensely focuses on a toy phone and does not integrate another person into play. Which early-sign category is most relevant?", options: ["Reduced social reciprocity/play integration", "Typical advanced symbolic play", "Strong coordinated joint engagement", "Clear shared pretend sequence"], answer: 0, explanation: "The concern is not the toy itself; it is reduced social reciprocity around the toy." },
        { type: "match", points: 2, topic: "Screening", prompt: "Match the tool: M-CHAT.", options: ["Parent-report autism screening for toddlers", "Direct observational autism diagnostic measure", "Parent-coaching intervention program", "Naturalistic developmental behavioral intervention"], answer: 0, explanation: "M-CHAT is a parent-report toddler screening tool, not a full direct observation or intervention." },
        { type: "match", points: 2, topic: "Assessment", prompt: "Match the tool: ADOS.", options: ["Direct observational assessment used in autism diagnosis", "Parent-report toddler screener", "Parent-mediated intervention model", "Short narrative intervention for social expectations"], answer: 0, explanation: "ADOS is the direct observational autism assessment concept emphasized in the notes." },
        { type: "mc", points: 2, topic: "Prevalence", prompt: "Which prevalence statement is the safest professor-style answer?", options: ["ASD occurs only in boys", "Girls cannot meet ASD criteria", "Gender prevalence is unrelated to autism content", "ASD is diagnosed more often in boys/males than girls/females"], answer: 3, explanation: "The exam target is the male-greater-than-female diagnosis pattern, without overclaiming that ASD occurs only in boys." },
        { type: "tf", points: 1, topic: "Autism precision", prompt: "Autistic children can have a wide spectrum of abilities and support needs.", answer: 0, explanation: "True. The spectrum framing is central." },
        { type: "tf", points: 1, topic: "Autism precision", prompt: "Every autistic child has the exact same language profile.", answer: 1, explanation: "False. This is an overgeneralization trap." }
      ]
    },
    {
      title: "Language, Behavior, and Intervention",

        { type: "match", points: 2, topic: "Echolalia", prompt: "Match the term: delayed echolalia.", options: ["Repeating language after time has passed", "Repeating a model immediately", "Producing no repeated language", "Responding only with newly generated grammar"], answer: 0, explanation: "Delayed echolalia is repetition after a delay; it can still have communicative function." },
        { type: "mc", points: 2, topic: "Language profile", prompt: "A child repeats a line from a show later during a stressful transition. Which answer is the BEST professor-style interpretation?", options: ["It proves the child cannot understand any language", "It is unrelated to autism content", "It should always be ignored because it is meaningless", "It may be delayed echolalia with communicative or regulatory function"], answer: 3, explanation: "Delayed echolalia can serve a function. The hard part is not dismissing it as automatically meaningless." },
        { type: "mc", points: 2, topic: "Behavioral profile", prompt: "Which statement is FALSE about behavioral profiles commonly discussed with ASD?", options: ["Restricted interests may be present", "Sensory differences may be present", "Repetitive behaviors may be present", "Every autistic child has an identical social motivation profile"], answer: 3, explanation: "FALSE: ASD profiles vary. Restricted/repetitive patterns and sensory differences are commonly discussed, but identical profiles are not." },
        { type: "match", points: 2, topic: "NDBI", prompt: "Match the term: NDBI.", options: ["Naturalistic developmental behavioral intervention", "Direct observational autism assessment", "Parent-report toddler screener", "Short individualized narrative for a social situation"], answer: 0, explanation: "NDBI combines developmental and behavioral strategies in naturalistic contexts." },

        { type: "mc", points: 2, topic: "Hanen", prompt: "Hanen More Than Words is best described as:", options: ["A parent-mediated intervention model for young autistic children", "A direct observational autism diagnostic measure", "A parent-report toddler screener", "A scripted Social Story protocol only"], answer: 0, explanation: "More Than Words is a parent-mediated model, which fits the professor's intervention-template questions." },
        { type: "mc", points: 2, topic: "Hanen", prompt: "What makes More Than Words different from traditional direct child therapy in the professor's review?", options: ["The SLP's main target is parent coaching and strategy carryover", "The SLP never teaches families any strategies", "The program is only a diagnostic observation", "The program teaches articulation without interaction goals"], answer: 0, explanation: "The transcript emphasized parent coaching, often through small-group or 1:1 training and review of parent-child interaction." },
        { type: "mc", points: 2, topic: "Hanen", prompt: "Which detail is NOT consistent with the More Than Words intervention format?", options: ["Parent practice/return demonstration and video review", "Parent coaching", "Small-group or 1:1 training sessions", "Clinician-only therapy with no family strategy teaching"], answer: 3, explanation: "NOT consistent: no family strategy teaching. More Than Words teaches parents strategies and uses practice/feedback." },
        { type: "mc", points: 2, topic: "Social Stories", prompt: "Which answer BEST describes Social Stories?", options: ["Short individualized narratives that clarify social situations and expectations", "A parent-report screener for toddler ASD risk", "A direct observational diagnostic assessment", "A naturalistic behavioral intervention umbrella term"], answer: 0, explanation: "Social Stories support understanding of situations; they are not the screener, the observation tool, or NDBI." },
        { type: "mc", points: 2, topic: "NRC recommendations", prompt: "Which item does NOT belong in National Research Council-style best-practice recommendations for young autistic children?", options: ["Family and parent training", "Ongoing assessment with programming adjusted by progress", "Intensive active instruction", "One identical treatment plan for every child"], answer: 3, explanation: "NOT in the list: one identical treatment plan. The NRC-style list emphasizes intensity, structure, family training, and ongoing progress-based adjustment." },
        { type: "mc", points: 2, topic: "NRC recommendations", prompt: "All are National Research Council-style recommendations EXCEPT:", options: ["Repeated planned activities with clear structure", "Family and parent training", "Ongoing assessment with programming adjusted by progress", "Avoid structured teaching because structure reduces generalization"], answer: 3, explanation: "EXCEPT: NRC-style guidance supports structure, active instruction, family training, and progress monitoring." },
        { type: "mc", points: 2, topic: "Professor trap", prompt: "All are appropriate autism intervention considerations EXCEPT:", options: ["Ignore family context because autism intervention is only clinician-directed", "Use child interests strategically", "Support social communication", "Individualize intervention"], answer: 0, explanation: "EXCEPT format: the wrong answer denies family/context and overstates clinician direction." },
        { type: "tf", points: 1, topic: "Intervention precision", prompt: "A child's restricted interests can sometimes be used as a bridge for engagement and communication.", answer: 0, explanation: "True. Clinically, interests can become an entry point rather than just a behavior to suppress." }
      ]
