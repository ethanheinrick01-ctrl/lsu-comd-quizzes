<script>
window.LANG_DIS_PAGE = {
  type: "quiz",
  course: "COMD 4382",
  title: "Autism Spectrum Drill",
  subtitle: "Focused practice for autism diagnostic criteria, early signs, language/behavior profiles, and intervention approaches.",
  sourceNote: "Built for Gonsoulin-style category discrimination: know the exact diagnostic bucket and the clinical example.",
  sections: [
    {
      title: "Diagnostic Criteria and Early Signs",
      desc: "Core deficits, early social-communication signs, and assessment tools.",
      questions: [
        { type: "multi", points: 2, topic: "DSM criteria", prompt: "Select ALL items that belong in the DSM-style ASD diagnostic picture.", options: ["Purely motor delay with no social-communication concern", "Persistent social communication/social interaction deficits", "Restricted, repetitive patterns of behavior, interests, or activities", "Symptoms present during the developmental period"], answer: [1,2,3], explanation: "The core picture is social communication/social interaction plus restricted/repetitive patterns, with developmental-period onset. A motor delay alone is not ASD." },
        { type: "mc", points: 2, topic: "Diagnostic trap", prompt: "Which statement is FALSE about ASD diagnosis?", options: ["Restricted and repetitive behaviors are part of the criteria", "Symptoms can vary widely across individuals", "A language delay by itself is enough for ASD", "Social communication differences are central"], answer: 2, explanation: "Language delay alone is not sufficient. The trap is confusing one possible feature with the full diagnosis." },
        { type: "multi", points: 2, topic: "Early signs", prompt: "Select ALL early signs that can suggest ASD risk.", options: ["Advanced pretend play with strong social sharing", "Reduced response to name", "Limited imitation or pretend play", "Limited joint attention"], answer: [1,2,3], explanation: "Early concern centers on response to name, joint attention, imitation, play, and shared engagement. Strong shared pretend play is not the risk sign." },
        { type: "mc", points: 2, topic: "Joint attention", prompt: "A child looks at a spinning object but does not look back to share interest with an adult. Which answer BEST labels the concern?", options: ["Weak visual joint attention/shared attention", "Only a symbolic vocabulary delay", "A transparent AAC symbol problem", "Sequential bilingualism"], answer: 0, explanation: "The missing piece is coordinating attention between object and person. That is the joint-attention/social-sharing concern." },
        { type: "mc", points: 2, topic: "Kennedy Krieger", prompt: "A toddler intensely focuses on a toy phone and does not integrate another person into play. Which early-sign category is most relevant?", options: ["Typical advanced symbolic play", "Only a feeding problem", "Reduced social reciprocity/play integration", "A hearing-loss-only profile"], answer: 2, explanation: "The video material contrasts play with social integration. The concern is not the toy itself; it is reduced social reciprocity around the toy." },
        { type: "match", points: 2, topic: "Screening", prompt: "Match the tool: M-CHAT.", options: ["Direct observational autism diagnostic measure", "AAC access method", "Parent-report autism screening for toddlers", "Vocabulary teaching intervention"], answer: 2, explanation: "M-CHAT is a parent-report toddler screening tool, not a full direct observation or intervention." },
        { type: "match", points: 2, topic: "Assessment", prompt: "Match the tool: ADOS.", options: ["Parent coaching model only", "AAC vocabulary display", "A pragmatic language treatment plan", "Direct observational assessment used in autism diagnosis"], answer: 3, explanation: "ADOS is the direct observational autism assessment concept emphasized in the notes." },
        { type: "mc", points: 2, topic: "Prevalence", prompt: "Which prevalence statement is the safest professor-style answer?", options: ["ASD occurs only in boys", "Girls cannot meet ASD criteria", "Gender prevalence is unrelated to autism content", "ASD is diagnosed more often in boys/males than girls/females"], answer: 3, explanation: "The exam target is the male-greater-than-female diagnosis pattern, without overclaiming that ASD occurs only in boys." },
        { type: "tf", points: 1, topic: "Autism precision", prompt: "Autistic children can have a wide spectrum of abilities and support needs.", answer: 0, explanation: "True. The spectrum framing is central." },
        { type: "tf", points: 1, topic: "Autism precision", prompt: "Every autistic child has the exact same language profile.", answer: 1, explanation: "False. This is an overgeneralization trap." }
      ]
    },
    {
      title: "Language, Behavior, and Intervention",
      desc: "Echolalia, behavioral characteristics, NDBI, Hanen, Social Stories, and intervention fit.",
      questions: [
        { type: "match", points: 2, topic: "Echolalia", prompt: "Match the term: immediate echolalia.", options: ["No spoken repetition at all", "Aided language input", "Repeating something right after hearing it", "Repeating language after a delay"], answer: 2, explanation: "Immediate echolalia occurs right after the model. Delayed echolalia occurs later." },
        { type: "match", points: 2, topic: "Echolalia", prompt: "Match the term: delayed echolalia.", options: ["A motor access method", "Repeating language after time has passed", "An assessment of adaptive behavior", "A nonverbal IQ test"], answer: 1, explanation: "Delayed echolalia is repetition after a delay; it can still have communicative function." },
        { type: "mc", points: 2, topic: "Language profile", prompt: "A child repeats a line from a show later during a stressful transition. Which answer is the BEST professor-style interpretation?", options: ["It proves the child cannot understand any language", "It is unrelated to autism content", "It should always be ignored because it is meaningless", "It may be delayed echolalia with communicative or regulatory function"], answer: 3, explanation: "Delayed echolalia can serve a function. The hard part is not dismissing it as automatically meaningless." },
        { type: "multi", points: 2, topic: "Behavioral profile", prompt: "Select ALL behavioral characteristics commonly discussed with ASD.", options: ["Identical social motivation in every child", "Restricted interests", "Sensory differences", "Repetitive behaviors"], answer: [1,2,3], explanation: "Restricted/repetitive patterns and sensory differences are common. Identical profile for every child is false." },
        { type: "match", points: 2, topic: "NDBI", prompt: "Match the term: NDBI.", options: ["A device-scanning method only", "A bilingual vocabulary score", "Naturalistic developmental behavioral intervention", "A hearing screening result"], answer: 2, explanation: "NDBI combines developmental and behavioral strategies in naturalistic contexts." },
        { type: "mc", points: 2, topic: "NDBI", prompt: "Which example BEST fits an NDBI-style approach?", options: ["A child sits for isolated flashcard drills only, with no natural interaction", "A family is told to avoid all child interests because they distract from therapy", "A clinician waits until the child is school age before beginning support", "The clinician follows the child's interest in bubbles and embeds social communication prompts with reinforcement"], answer: 3, explanation: "NDBI blends developmental, behavioral, and naturalistic strategies. The child interest and natural interaction are doing real work here." },
        { type: "mc", points: 2, topic: "Hanen", prompt: "Hanen More Than Words is best described as:", options: ["A diagnostic instrument replacing all clinical judgment", "A speech-only articulation drill", "A parent-mediated intervention model for young autistic children", "An AAC device brand"], answer: 2, explanation: "More Than Words is a parent-mediated model, which fits the professor's intervention-template questions." },
        { type: "mc", points: 2, topic: "Hanen", prompt: "What makes More Than Words different from traditional direct child therapy in the professor's review?", options: ["The SLP never interacts with families", "It is a scantron diagnostic test", "It teaches only speech sounds", "The SLP's main target is parent coaching and strategy carryover"], answer: 3, explanation: "The transcript emphasized that the focus is parent coaching, often through small-group or 1:1 training and review of parent-child interaction." },
        { type: "multi", points: 2, topic: "Hanen", prompt: "Select ALL details that fit the More Than Words intervention format.", options: ["Clinician-only therapy with no family strategy teaching", "Parent practice/return demonstration and video review", "Parent coaching", "Small-group or 1:1 training sessions"], answer: [1,2,3], explanation: "More Than Words teaches parents strategies, has practice/feedback, and may use video review. The no-family option is the trap." },
        { type: "mc", points: 2, topic: "Social Stories", prompt: "Which answer BEST describes Social Stories?", options: ["Short individualized narratives that clarify social situations and expectations", "A test of nonverbal IQ", "A method for eliminating all autistic traits", "A synonym for PECS"], answer: 0, explanation: "Social Stories support understanding of situations; they are not PECS, a nonverbal IQ test, or a cure claim." },
        { type: "multi", points: 2, topic: "NRC recommendations", prompt: "Select ALL National Research Council-style best-practice recommendations for young autistic children.", options: ["One identical treatment plan for every child", "Family and parent training", "Ongoing assessment with programming adjusted by progress", "Intensive active instruction", "Repeated planned activities with clear structure"], answer: [1,2,3,4], explanation: "The NRC list emphasizes intensity, structure, family training, and ongoing progress-based adjustment. One identical plan is not best practice." },
        { type: "mc", points: 2, topic: "NRC recommendations", prompt: "All are National Research Council-style recommendations EXCEPT:", options: ["Repeated planned activities with clear structure", "Family and parent training", "Ongoing assessment with programming adjusted by progress", "Avoid structured teaching because structure reduces generalization"], answer: 3, explanation: "EXCEPT: NRC-style guidance supports structure, active instruction, family training, and progress monitoring." },
        { type: "mc", points: 2, topic: "Professor trap", prompt: "All are appropriate autism intervention considerations EXCEPT:", options: ["Ignore family context because autism intervention is only clinician-directed", "Use child interests strategically", "Support social communication", "Individualize intervention"], answer: 0, explanation: "EXCEPT format: the wrong answer denies family/context and overstates clinician direction." },
        { type: "tf", points: 1, topic: "Intervention precision", prompt: "A child's restricted interests can sometimes be used as a bridge for engagement and communication.", answer: 0, explanation: "True. Clinically, interests can become an entry point rather than just a behavior to suppress." }
      ]
    }
  ]
};
