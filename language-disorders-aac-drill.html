window.LANG_DIS_PAGE = {
  type: "quiz",
  course: "COMD 4382",
  title: "AAC Myths and Intervention Drill",
  subtitle: "Auto-graded AAC practice for definitions, myths, components, assessment, intervention, and access traps.",
  sourceNote: "Built from Chapter 11 AAC notes, AAC do/don't handout, and Gonsoulin-style negative wording.",
  sections: [
    {
      title: "AAC Definition, Myths, and Components",
      desc: "Know what AAC is, what it is not, and the four-component list.",
      questions: [
        { type: "mc", points: 2, topic: "Definition", prompt: "Which answer BEST defines AAC?", options: ["A clinical area that supplements or compensates for communication impairments", "Only a high-tech speech-generating device", "A last-resort method used only after speech fails", "A system that replaces all spoken communication"], answer: 0, explanation: "AAC is broad, multimodal, and can supplement or compensate. High-tech-only and last-resort are classic myths." },
        { type: "multi", points: 2, topic: "Myths", prompt: "Select ALL statements that are AAC myths or misconceptions.", options: ["AAC prevents speech development", "AAC is only for children with no speech", "AAC must always be high-tech", "AAC can support communication and language input"], answer: [0,1,2], explanation: "The first three are myths. AAC can support communication and language; that is the evidence-aligned statement." },
        { type: "mc", points: 2, topic: "Myths", prompt: "A parent says, 'If my child gets an AAC device, they will never learn to talk.' Which response best matches the course material?", options: ["That is an AAC myth; AAC can support communication and language development", "That is true, so AAC should wait until adulthood", "That is the definition of facilitated communication", "That is why only transparent symbols can be used"], answer: 0, explanation: "The transcript specifically flagged this parent fear. AAC does not prevent speech and can support language." },
        { type: "multi", points: 2, topic: "Components", prompt: "Select ALL four AAC components emphasized in the course.", options: ["Symbols", "Aids", "Strategies", "Techniques", "Birth order"], answer: [0,1,2,3], explanation: "The four AAC components are symbols, aids, strategies, and techniques." },
        { type: "match", points: 2, topic: "Components", prompt: "Match the AAC component: symbols.", options: ["Representations used to stand for meaning", "Physical tools or devices used to transmit messages", "Ways to use the system efficiently", "Teaching procedures used to support use"], answer: 0, explanation: "Symbols carry meaning: objects, pictures, signs, written words, or other representations." },
        { type: "mc", points: 2, topic: "Symbol transparency", prompt: "Professor callout: Which list names the three AAC symbol relationship types?", options: ["Transparent, translucent, opaque", "Simultaneous, sequential, conceptual", "Intermittent, extensive, pervasive", "Linguistic, operational, strategic"], answer: 0, explanation: "The transcript called out transparent, translucent, and opaque symbols. The other lists belong to different units." },
        { type: "match", points: 2, topic: "Symbol transparency", prompt: "Match the symbol type: transparent.", options: ["The symbol's meaning is obvious from its appearance", "The symbol makes sense only after context is explained", "The symbol-to-meaning link is arbitrary and must be learned", "The symbol is a support level"], answer: 0, explanation: "Transparent symbols directly resemble or clearly suggest what they mean, like an obvious picture/icon." },
        { type: "match", points: 2, topic: "Symbol transparency", prompt: "Match the symbol type: translucent.", options: ["The symbol is arbitrary with no visual clue", "The symbol relationship makes sense once you know the context", "The symbol is always a spoken word only", "The symbol means simultaneous bilingualism"], answer: 1, explanation: "Translucent symbols are not obvious at first glance, but the relationship becomes clear with context." },
        { type: "match", points: 2, topic: "Symbol transparency", prompt: "Match the symbol type: opaque.", options: ["The symbol-to-meaning relationship is arbitrary and must be learned", "The symbol is immediately obvious to any viewer", "The symbol is only used for scanning", "The symbol is another name for aided modeling"], answer: 0, explanation: "Opaque symbols do not visually reveal their meaning; the user has to learn the association." },
        { type: "match", points: 2, topic: "Components", prompt: "Match the AAC component: aids.", options: ["Physical tools or materials used for communication", "Only partner wait time", "The reason a child qualifies for intervention", "A diagnostic category"], answer: 0, explanation: "Aids are the tangible tools or materials; they can be low-tech or high-tech." },
        { type: "mc", points: 2, topic: "Complex needs", prompt: "Complex communication needs means:", options: ["A person has difficulty meeting communication needs using speech alone", "The person must use high-tech AAC", "The person cannot learn language", "The family must stop using natural gestures"], answer: 0, explanation: "Complex needs describe communication support needs, not a high-tech requirement or inability to learn." },
        { type: "mc", points: 2, topic: "Complex needs", prompt: "Which statement is LEAST consistent with complex communication needs?", options: ["Speech alone may not meet the person's communication needs", "AAC may include unaided, low-tech, or high-tech supports", "The person may need support across partners and settings", "The person cannot learn language if AAC is considered"], answer: 3, explanation: "LEAST consistent: AAC consideration does not mean the person cannot learn language." },
        { type: "tf", points: 1, topic: "AAC precision", prompt: "AAC can be multimodal and include gesture, facial expression, drawing, writing, signs, and devices.", answer: 0, explanation: "True. Multimodal communication is part of the definition." },
        { type: "tf", points: 1, topic: "AAC precision", prompt: "AAC is only about requesting wants and needs.", answer: 1, explanation: "False. AAC should support broad communicative functions: social closeness, information sharing, protesting, commenting, and more." }
      ]
    },
    {
      title: "Assessment, Access, and Intervention",
      desc: "Assessment components, selection methods, modeling, PECS, vocabulary, and communication competence.",
      questions: [
        { type: "multi", points: 2, topic: "Assessment", prompt: "Select ALL areas that belong in an AAC assessment.", options: ["Motor/access abilities", "Cognitive and linguistic abilities", "Sensory/perceptual skills", "Family and environmental demands", "Only whether the child can spell"], answer: [0,1,2,3], explanation: "AAC assessment is broad: access, language, sensory/perceptual, environment, participation, and family priorities." },
        { type: "match", points: 2, topic: "Access", prompt: "Match the access method: direct selection.", options: ["User directly points, touches, looks, or otherwise selects the target", "Options are presented in sequence until the user chooses", "Partner authors the message", "The system has only nouns"], answer: 0, explanation: "Direct selection means the user directly selects the desired item." },
        { type: "match", points: 2, topic: "Access", prompt: "Match the access method: scanning.", options: ["Options are presented one at a time or in groups until the user selects", "The user freely types a full essay", "Only facial expression with no system", "A banned message-authorship method"], answer: 0, explanation: "Scanning presents choices sequentially or by groups for selection." },
        { type: "mc", points: 2, topic: "Access", prompt: "A student cannot directly touch small icons, so choices are highlighted row by row until the student activates a switch. Which access method is this?", options: ["Scanning", "Direct selection", "Conceptual vocabulary", "Delayed echolalia"], answer: 0, explanation: "The options are presented sequentially and the user selects when the target is highlighted: scanning." },
        { type: "mc", points: 2, topic: "Aided language stimulation", prompt: "Aided language stimulation, also called aided AAC modeling, is best described as:", options: ["The partner speaks while also using the AAC system to model language in real interaction", "Taking the device away until the child asks", "Only prompting the child to repeat spoken words", "Replacing all partner speech with silence"], answer: 0, explanation: "The professor's transcript used aided language stimulation/modeling. The key is the communication partner using the AAC system as input while talking." },
        { type: "mc", points: 2, topic: "Aided language stimulation", prompt: "A child looks toward the door and the partner says, 'Go outside?' while selecting outside/go on the AAC system. What is this?", options: ["Aided language stimulation/modeling", "Facilitated communication", "Sequential bilingualism", "Stimulus overselectivity"], answer: 0, explanation: "The partner is using the child's AAC system during natural communication to model language." },
        { type: "mc", points: 2, topic: "Aided language stimulation", prompt: "Which example is NOT aided language stimulation/modeling?", options: ["A partner uses the child's AAC system while talking during play", "A partner models 'more' on the device while saying 'want more?'", "A partner points to outside/go on the device while talking about going outside", "A partner removes the device and only asks the child to repeat spoken words"], answer: 3, explanation: "NOT aided modeling: removing the system and drilling speech repetition. Aided modeling requires the partner to use the AAC system as input." },
        { type: "mc", points: 2, topic: "PECS", prompt: "PECS is best described as:", options: ["A picture exchange communication system with structured teaching phases", "A general name for every AAC method", "A diagnostic test for ASD", "A direct synonym for scanning"], answer: 0, explanation: "PECS is a specific picture exchange approach, not every AAC method." },
        { type: "mc", points: 2, topic: "Vocabulary", prompt: "Which answer BEST separates core and fringe vocabulary?", options: ["Core words are high-frequency flexible words; fringe words are more specific content words", "Core words are only nouns; fringe words are only verbs", "Core vocabulary is only for adults", "Fringe vocabulary is never useful"], answer: 0, explanation: "Core is flexible and frequent; fringe is more specific. Both can matter." },
        { type: "mc", points: 2, topic: "Vocabulary", prompt: "Which pair is MOST accurate?", options: ["Core: go, more, stop; fringe: dinosaur, stethoscope, cafeteria", "Core: only rare nouns; fringe: all high-frequency verbs", "Core: only adult vocabulary; fringe: vocabulary children cannot use", "Core: opaque symbols only; fringe: transparent symbols only"], answer: 0, explanation: "Core words are flexible and high frequency; fringe words are specific to topics, people, places, or activities." },
        { type: "multi", points: 2, topic: "Do's and don'ts", prompt: "Select ALL AAC do's.", options: ["Provide enough wait time", "Use the AAC system yourself to talk", "Keep the system available across the day", "Limit access so the child does not rely on it"], answer: [0,1,2], explanation: "Wait time, partner modeling, and access are do's. Limiting access is the don't." },
        { type: "mc", points: 2, topic: "Communication competence", prompt: "Which list BEST fits communication competence for AAC users?", options: ["Linguistic, operational, social, and strategic competence", "Only vocabulary size", "Only motor control", "Only parent preference"], answer: 0, explanation: "Communication competence is multidimensional, not just vocabulary or motor access." },
        { type: "mc", points: 2, topic: "Discredited methods", prompt: "Which statement is FALSE about facilitated communication?", options: ["It has been discredited because message authorship is not reliably the user's", "Major professional organizations warn against it", "It is different from independent AAC access", "It is the strongest evidence-based AAC intervention"], answer: 3, explanation: "The false statement is that it is strongly evidence-based. The authorship problem is the core issue." },
        { type: "mc", points: 2, topic: "Discredited methods", prompt: "Which scenario is the biggest authorship red flag?", options: ["A user independently selects symbols with eye gaze", "A partner models language on the AAC device while speaking", "A communication partner physically supports the user's hand and appears to generate complex messages", "A user chooses between scanned options with a switch"], answer: 2, explanation: "Physical support with unclear message authorship points toward facilitated communication concerns, not independent AAC access." },
        { type: "mc", points: 2, topic: "Professor trap", prompt: "All are AAC intervention principles EXCEPT:", options: ["Model language with the AAC system", "Teach communication beyond requesting", "Support access across environments", "Wait until speech is completely absent before considering AAC"], answer: 3, explanation: "EXCEPT format: AAC is not a last resort and should not require total absence of speech." }
      ]
    }
  ]
